                          <circle cx={dev.x + NODE_W} cy={py + PORT_H / 2} r={5}
                            fill={focusedPort && focusedPort.devId === dev.id && focusedPort.portId === port.id ? "#fff" : kc.line}
                            stroke="rgba(0,0,0,0.5)" strokeWidth={1.5} />
                          <text x={dev.x + NODE_W - 12} y={py + PORT_H / 2 + 3.5} fill="rgba(255,255,255,0.6)" fontSize={9} fontFamily="inherit" textAnchor="end">{port.name}</text>
                        </g>
                      );
                    })}
                  </g>
                );
              })}
            </g>
          </svg>

          {/* Connection editor */}
          {selectedConn ? (function() {
            var conn = connections.find(function(c) { return c.id === selectedConn; });
            if (!conn) return null;
            var fromDev = devices.find(function(d) { return d.id === conn.from.device; });
            var toDev = devices.find(function(d) { return d.id === conn.to.device; });
            var fromPort = fromDev && fromDev.ports.find(function(p) { return p.id === conn.from.port; });
            var toPort = toDev && toDev.ports.find(function(p) { return p.id === conn.to.port; });
            var kc = KIND_COLORS[conn.kind] || KIND_COLORS.audio;
            return (
              <div style={{ position: "absolute", bottom: 16, left: "50%", transform: "translateX(-50%)",
                background: "rgba(12,12,22,0.97)", border: "1px solid " + kc.line + "44",
                borderRadius: 8, padding: "10px 16px", display: "flex", alignItems: "center",
                gap: 10, backdropFilter: "blur(12px)", zIndex: 30 }}>
                <span style={{ color: kc.line, fontSize: 11 }}>
                  {fromDev && fromDev.name}:{fromPort && fromPort.name} &rarr; {toDev && toDev.name}:{toPort && toPort.name}
                </span>
                <input placeholder="Etiqueta..." value={conn.label || ""}
                  onChange={function(e) {
                    var v = e.target.value; var cid = conn.id;
                    setConnections(function(cs) { return cs.map(function(c) { return c.id === cid ? Object.assign({}, c, { label: v }) : c; }); });
                  }}
                  style={Object.assign({}, inputSt, { width: 120 })} />
                <select value={conn.mode || "all"}
                  onChange={function(e) {
                    var v = e.target.value; var cid = conn.id;
                    setConnections(function(cs) { return cs.map(function(c) { return c.id === cid ? Object.assign({}, c, { mode: v }) : c; }); });
                  }}
                  style={selectSt}>
                  <option value="all">Ambos</option>
                  <option value="daw">Solo DAW</option>
                  <option value="jam">Solo Jam</option>
                </select>
                <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                  <span style={{ color: "rgba(255,255,255,0.3)", fontSize: 9, fontFamily: "inherit" }}>Grosor</span>
                  <input type="range" min="1" max="8" step="0.5"
                    value={conn.strokeW || globalCableW}
                    onChange={function(e) {
                      var v = parseFloat(e.target.value); var cid = conn.id;
                      setConnections(function(cs) { return cs.map(function(c) { return c.id === cid ? Object.assign({}, c, { strokeW: v }) : c; }); });
                    }}
                    style={{ width: 70, accentColor: kc.line }} />
                  <span style={{ color: kc.line, fontSize: 10, fontFamily: "inherit", minWidth: 16 }}>{conn.strokeW || 2}</span>
                </div>
                <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                  <span style={{ color: "rgba(255,255,255,0.3)", fontSize: 9, fontFamily: "inherit" }}>Opacidad</span>
                  <input type="range" min="0.05" max="1" step="0.05"
                    value={conn.opacity !== undefined ? conn.opacity : globalCableOp}
                    onChange={function(e) {
                      var v = parseFloat(e.target.value); var cid = conn.id;
                      setConnections(function(cs) { return cs.map(function(c) { return c.id === cid ? Object.assign({}, c, { opacity: v }) : c; }); });
                    }}
                    style={{ width: 70, accentColor: kc.line }} />
                  <span style={{ color: kc.line, fontSize: 10, fontFamily: "inherit", minWidth: 28 }}>{Math.round((conn.opacity !== undefined ? conn.opacity : globalCableOp) * 100)}%</span>
                </div>
                <button onClick={function() { deleteConnection(conn.id); }}
                  style={btnStyle("rgba(255,0,0,0.15)","rgba(255,80,80,0.3)","#ff5050")}>Borrar</button>
              </div>
            );
          })() : null}

          {/* Device note editor */}
          {editingDeviceNote ? (function() {
            var dev = devices.find(function(d) { return d.id === editingDeviceNote; });
            if (!dev) return null;
            return (
              <div style={{ position: "absolute", bottom: 16, left: "50%", transform: "translateX(-50%)",
                background: "rgba(12,12,22,0.97)", border: "1px solid rgba(255,234,167,0.3)",
                borderRadius: 8, padding: "10px 16px", display: "flex", alignItems: "center",
                gap: 10, backdropFilter: "blur(12px)", zIndex: 30, maxWidth: 600 }}>
                <span style={{ color: dev.color, fontSize: 11, whiteSpace: "nowrap" }}>{dev.name}</span>
                <input placeholder="Nota sobre este dispositivo..." value={dev.notes || ""}
                  onChange={function(e) {
                    var v = e.target.value; var did = editingDeviceNote;
                    setDevices(function(ds) { return ds.map(function(d) { return d.id === did ? Object.assign({}, d, { notes: v }) : d; }); });
                  }}
                  style={Object.assign({}, inputSt, { flex: 1, minWidth: 260 })} />
                <button onClick={function() { setEditingDeviceNote(null); }}
                  style={btnStyle("rgba(255,255,255,0.08)","rgba(255,255,255,0.15)","rgba(255,255,255,0.5)")}>OK</button>
              </div>
            );
          })() : null}

          {/* Edit Ports Modal */}
          {editingPorts ? (function() {
            var dev = devices.find(function(d) { return d.id === editingPorts; });
            if (!dev) return null;
            return (
              <div style={{ position: "absolute", top: 0, left: 0, right: 0, bottom: 0,
                background: "rgba(0,0,0,0.7)", zIndex: 50, display: "flex", alignItems: "center", justifyContent: "center" }}
                onClick={function() { setEditingPorts(null); }}>
                <div onClick={function(e) { e.stopPropagation(); }}
                  style={{ background: "rgba(18,18,28,0.99)", border: "1px solid " + dev.color + "44",
                    borderRadius: 12, padding: 22, width: 500, maxHeight: "85vh", overflow: "auto" }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 14 }}>
                    <div style={{ width: 12, height: 12, borderRadius: 3, background: dev.color }} />
                    <span style={{ color: "#fff", fontSize: 14, fontWeight: 700, flex: 1 }}>Editar: {dev.name}</span>
                  </div>
                  <div style={{ display: "flex", gap: 8, marginBottom: 12 }}>
                    <input value={dev.name}
                      onChange={function(e) {
                        var v = e.target.value; var did = editingPorts;
                        setDevices(function(ds) { return ds.map(function(d) { return d.id === did ? Object.assign({}, d, { name: v }) : d; }); });
                      }}
                      style={Object.assign({}, inputSt, { flex: 1 })} />
                    <input type="color" value={dev.color}
                      onChange={function(e) {
                        var v = e.target.value; var did = editingPorts;
                        setDevices(function(ds) { return ds.map(function(d) { return d.id === did ? Object.assign({}, d, { color: v }) : d; }); });
                      }}
                      style={{ width: 34, height: 30, border: "none", borderRadius: 4, cursor: "pointer", background: "transparent" }} />
                  </div>
                  <div style={{ borderTop: "1px solid rgba(255,255,255,0.06)", paddingTop: 10, marginBottom: 8 }}>
                    {dev.ports.map(function(port, i) {
                      var hasConn = connections.some(function(c) { return c.from.port === port.id || c.to.port === port.id; });
                      return (
                        <div key={port.id} style={{ display: "grid", gridTemplateColumns: "1fr 70px 72px 26px", gap: 5, marginBottom: 5, alignItems: "center" }}>
                          <input value={port.name}
                            onChange={function(e) {
                              var v = e.target.value; var did = editingPorts; var ii = i;
                              setDevices(function(ds) { return ds.map(function(d) {
                                if (d.id !== did) return d;
                                var np = d.ports.slice(); np[ii] = Object.assign({}, np[ii], { name: v });
                                return Object.assign({}, d, { ports: np });
                              }); });
                            }}
                            style={inputSt} />
                          <select value={port.dir}
                            onChange={function(e) {
                              var v = e.target.value; var did = editingPorts; var ii = i;
                              setDevices(function(ds) { return ds.map(function(d) {
                                if (d.id !== did) return d;
                                var np = d.ports.slice(); np[ii] = Object.assign({}, np[ii], { dir: v });
                                return Object.assign({}, d, { ports: np });
                              }); });
                            }}
                            style={selectSt}>
                            <option value="in">In</option>
                            <option value="out">Out</option>
                            <option value="both">Both</option>
                          </select>
                          <select value={port.kind}
                            onChange={function(e) {
                              var v = e.target.value; var did = editingPorts; var ii = i;
                              setDevices(function(ds) { return ds.map(function(d) {
                                if (d.id !== did) return d;
                                var np = d.ports.slice(); np[ii] = Object.assign({}, np[ii], { kind: v });
                                return Object.assign({}, d, { ports: np });
                              }); });
                            }}
                            style={selectSt}>
                            <option value="audio">Audio</option>
                            <option value="midi">MIDI</option>
                            <option value="cv">CV</option>
                            <option value="digital">Digital</option>
                          </select>
                          <button
                            onClick={function(e) {
                              e.stopPropagation();
                              var pid = port.id; var did = editingPorts;
                              if (hasConn) { if (!window.confirm("Tiene conexiones. Borrar igualmente?")) return; }
                              setConnections(function(cs) { return cs.filter(function(c) { return c.from.port !== pid && c.to.port !== pid; }); });
                              setDevices(function(ds) { return ds.map(function(d) {
                                if (d.id !== did) return d;
                                return Object.assign({}, d, { ports: d.ports.filter(function(p) { return p.id !== pid; }) });
                              }); });
                            }}
                            style={{ background: "none", border: "none", color: hasConn ? "#ff5050" : "rgba(255,255,255,0.3)", cursor: "pointer", fontSize: 16, padding: 0 }}>x</button>
                        </div>
                      );
                    })}
                  </div>
                  <button
                    onClick={function() {
                      var did = editingPorts;
                      setDevices(function(ds) { return ds.map(function(d) {
                        if (d.id !== did) return d;
                        var newPort = { id: d.id + "-p-" + Date.now(), name: "Nuevo", dir: "out", kind: "audio" };
                        return Object.assign({}, d, { ports: d.ports.concat([newPort]) });
                      }); });
                    }}
                    style={{ width: "100%", padding: "6px", background: "rgba(255,255,255,0.04)",
                      border: "1px dashed rgba(255,255,255,0.12)", borderRadius: 4,
                      color: "rgba(255,255,255,0.4)", fontSize: 11, cursor: "pointer",
                      fontFamily: "inherit", marginBottom: 14 }}>
                    + Agregar Puerto
                  </button>
                  <button onClick={function() { setEditingPorts(null); }}
                    style={{ width: "100%", padding: "8px", background: "rgba(116,185,255,0.15)",
                      border: "1px solid rgba(116,185,255,0.3)", borderRadius: 6,
                      color: "#74B9FF", fontSize: 12, cursor: "pointer", fontFamily: "inherit", fontWeight: 600 }}>
                    Listo
                  </button>
                </div>
              </div>
            );
          })() : null}

          {/* Add Device Modal */}
          {showAdd ? (
            <div style={{ position: "absolute", top: 0, left: 0, right: 0, bottom: 0,
              background: "rgba(0,0,0,0.7)", zIndex: 50, display: "flex", alignItems: "center", justifyContent: "center" }}
              onClick={function() { setShowAdd(false); }}>
              <div onClick={function(e) { e.stopPropagation(); }}
                style={{ background: "rgba(18,18,28,0.99)", border: "1px solid rgba(255,255,255,0.1)",
                  borderRadius: 12, padding: 22, width: 380, maxHeight: "80vh", overflow: "auto" }}>
                <h3 style={{ color: "#fff", margin: "0 0 14px", fontSize: 14, fontFamily: "inherit", fontWeight: 600 }}>Nuevo Dispositivo</h3>
                <input placeholder="Nombre" value={newDevice.name}
                  onChange={function(e) { setNewDevice(function(d) { return Object.assign({}, d, { name: e.target.value }); }); }}
                  style={Object.assign({}, inputSt, { width: "100%", boxSizing: "border-box", marginBottom: 10, fontSize: 13 })} />
                <div style={{ display: "flex", gap: 8, marginBottom: 12 }}>
                  <select value={newDevice.type}
                    onChange={function(e) { setNewDevice(function(d) { return Object.assign({}, d, { type: e.target.value }); }); }}
                    style={Object.assign({}, selectSt, { flex: 1 })}>
                    {Object.keys(TYPE_ICONS).map(function(t) { return <option key={t} value={t}>{t}</option>; })}
                  </select>
                  <input type="color" value={newDevice.color}
                    onChange={function(e) { setNewDevice(function(d) { return Object.assign({}, d, { color: e.target.value }); }); }}
                    style={{ width: 38, height: 32, border: "none", borderRadius: 4, cursor: "pointer", background: "transparent" }} />
                </div>
                <div style={{ color: "rgba(255,255,255,0.4)", fontSize: 10, marginBottom: 8, letterSpacing: 1 }}>PUERTOS</div>
                {newPorts.map(function(p, i) {
                  return (
                    <div key={i} style={{ display: "flex", gap: 5, marginBottom: 5, alignItems: "center" }}>
                      <input value={p.name}
                        onChange={function(e) {
                          var v = e.target.value; var ii = i;
                          setNewPorts(function(ps) { var np = ps.slice(); np[ii] = Object.assign({}, np[ii], { name: v }); return np; });
                        }}
                        style={Object.assign({}, inputSt, { flex: 1 })} />
                      <select value={p.dir}
                        onChange={function(e) {
                          var v = e.target.value; var ii = i;
                          setNewPorts(function(ps) { var np = ps.slice(); np[ii] = Object.assign({}, np[ii], { dir: v }); return np; });
                        }}
                        style={selectSt}>
                        <option value="in">In</option><option value="out">Out</option><option value="both">Both</option>
                      </select>
                      <select value={p.kind}
                        onChange={function(e) {
                          var v = e.target.value; var ii = i;
                          setNewPorts(function(ps) { var np = ps.slice(); np[ii] = Object.assign({}, np[ii], { kind: v }); return np; });
                        }}
                        style={selectSt}>
                        <option value="audio">Audio</option><option value="midi">MIDI</option>
                        <option value="cv">CV</option><option value="digital">Digital</option>
                      </select>
                      <button onClick={function(e) { var ii = i; setNewPorts(function(ps) { return ps.filter(function(_, j) { return j !== ii; }); }); }}
                        style={{ background: "none", border: "none", color: "#ff5050", cursor: "pointer", fontSize: 16, padding: 0 }}>x</button>
                    </div>
                  );
                })}
                <button onClick={function() { setNewPorts(function(ps) { return ps.concat([{ name: "Puerto " + (ps.length + 1), dir: "out", kind: "audio" }]); }); }}
                  style={{ width: "100%", padding: "5px", background: "rgba(255,255,255,0.04)",
                    border: "1px dashed rgba(255,255,255,0.12)", borderRadius: 4,
                    color: "rgba(255,255,255,0.4)", fontSize: 11, cursor: "pointer", fontFamily: "inherit", marginBottom: 14 }}>
                  + Puerto
                </button>
                <div style={{ display: "flex", gap: 8 }}>
                  <button onClick={addDevice}
                    style={{ flex: 1, padding: "8px", background: "rgba(0,206,201,0.2)",
                      border: "1px solid #00CEC9", borderRadius: 6, color: "#00CEC9",
                      fontSize: 12, cursor: "pointer", fontFamily: "inherit", fontWeight: 600 }}>Crear</button>
                  <button onClick={function() { setShowAdd(false); }}
                    style={{ padding: "8px 14px", background: "rgba(255,255,255,0.06)",
                      border: "1px solid rgba(255,255,255,0.1)", borderRadius: 6,
                      color: "rgba(255,255,255,0.4)", fontSize: 12, cursor: "pointer", fontFamily: "inherit" }}>Cancelar</button>
                </div>
              </div>
            </div>
          ) : null}

          {/* Export JSON Modal */}
          {showExportModal ? (
            <div style={{ position: "absolute", top: 0, left: 0, right: 0, bottom: 0,
              background: "rgba(0,0,0,0.7)", zIndex: 50, display: "flex", alignItems: "center", justifyContent: "center" }}
              onClick={function() { setShowExportModal(false); }}>
              <div onClick={function(e) { e.stopPropagation(); }}
                style={{ background: "rgba(18,18,28,0.99)", border: "1px solid rgba(255,255,255,0.1)",
                  borderRadius: 12, padding: 22, width: 500, maxHeight: "80vh", display: "flex", flexDirection: "column", gap: 10 }}>
                <h3 style={{ color: "#fff", margin: 0, fontSize: 14, fontFamily: "inherit" }}>Exportar JSON</h3>
                <p style={{ color: "rgba(255,255,255,0.4)", margin: 0, fontSize: 11, fontFamily: "inherit" }}>Copia este texto y guardalo como archivo .json</p>
                <textarea value={exportData} readOnly onClick={function(e) { e.target.select(); }}
                  style={{ width: "100%", height: 240, boxSizing: "border-box", background: "rgba(0,0,0,0.4)",
                    border: "1px solid rgba(255,255,255,0.1)", borderRadius: 6, padding: 10,
                    color: "#00CEC9", fontSize: 10, fontFamily: "inherit", resize: "none" }} />
                <div style={{ display: "flex", gap: 8 }}>
                  <button onClick={copyToClipboard}
                    style={{ flex: 1, padding: "8px", background: "rgba(0,206,201,0.2)",
                      border: "1px solid #00CEC9", borderRadius: 6, color: "#00CEC9",
                      fontSize: 12, cursor: "pointer", fontFamily: "inherit", fontWeight: 600 }}>Copiar</button>
                  <button onClick={function() { setShowExportModal(false); }}
                    style={{ padding: "8px 14px", background: "rgba(255,255,255,0.06)",
                      border: "1px solid rgba(255,255,255,0.1)", borderRadius: 6,
                      color: "rgba(255,255,255,0.4)", fontSize: 12, cursor: "pointer", fontFamily: "inherit" }}>Cerrar</button>
                </div>
              </div>
            </div>
          ) : null}

          {/* Import JSON Modal */}
          {showImportModal ? (
            <div style={{ position: "absolute", top: 0, left: 0, right: 0, bottom: 0,
              background: "rgba(0,0,0,0.7)", zIndex: 50, display: "flex", alignItems: "center", justifyContent: "center" }}
              onClick={function() { setShowImportModal(false); }}>
              <div onClick={function(e) { e.stopPropagation(); }}
                style={{ background: "rgba(18,18,28,0.99)", border: "1px solid rgba(255,255,255,0.1)",
                  borderRadius: 12, padding: 22, width: 500, maxHeight: "80vh", display: "flex", flexDirection: "column", gap: 10 }}>
                <h3 style={{ color: "#fff", margin: 0, fontSize: 14, fontFamily: "inherit" }}>Importar JSON</h3>
                <p style={{ color: "rgba(255,255,255,0.4)", margin: 0, fontSize: 11, fontFamily: "inherit" }}>Pega aqui el JSON exportado anteriormente</p>
                <textarea value={importText} onChange={function(e) { setImportText(e.target.value); }}
                  placeholder="Pega tu JSON aqui..."
                  style={{ width: "100%", height: 240, boxSizing: "border-box", background: "rgba(0,0,0,0.4)",
                    border: "1px solid rgba(255,255,255,0.1)", borderRadius: 6, padding: 10,
                    color: "#fff", fontSize: 10, fontFamily: "inherit", resize: "none" }} />
                <div style={{ display: "flex", gap: 8 }}>
                  <button onClick={importFromText}
                    style={{ flex: 1, padding: "8px", background: "rgba(116,185,255,0.2)",
                      border: "1px solid #74B9FF", borderRadius: 6, color: "#74B9FF",
                      fontSize: 12, cursor: "pointer", fontFamily: "inherit", fontWeight: 600 }}>Importar</button>
                  <button onClick={function() { setShowImportModal(false); setImportText(""); }}
                    style={{ padding: "8px 14px", background: "rgba(255,255,255,0.06)",
                      border: "1px solid rgba(255,255,255,0.1)", borderRadius: 6,
                      color: "rgba(255,255,255,0.4)", fontSize: 12, cursor: "pointer", fontFamily: "inherit" }}>Cancelar</button>
                </div>
              </div>
            </div>
          ) : null}

          {/* Snapshots Modal */}
          {showSnapshots ? (
            <div style={{ position: "absolute", top: 0, left: 0, right: 0, bottom: 0,
              background: "rgba(0,0,0,0.7)", zIndex: 50, display: "flex", alignItems: "center", justifyContent: "center" }}
              onClick={function() { setShowSnapshots(false); }}>
              <div onClick={function(e) { e.stopPropagation(); }}
                style={{ background: "rgba(18,18,28,0.99)", border: "1px solid rgba(255,255,255,0.1)",
                  borderRadius: 12, padding: 22, width: 440, maxHeight: "80vh", display: "flex", flexDirection: "column", gap: 10 }}>
                <h3 style={{ color: "#fff", margin: 0, fontSize: 14, fontFamily: "inherit" }}>Versiones Guardadas</h3>
                {savedSnapshots.length === 0 ? (
                  <p style={{ color: "rgba(255,255,255,0.3)", fontSize: 12, fontFamily: "inherit", textAlign: "center", padding: 20 }}>
                    No hay versiones. Usa "Guardar" para crear una.
                  </p>
                ) : (
                  <div style={{ maxHeight: 380, overflow: "auto", display: "flex", flexDirection: "column", gap: 5 }}>
                    {savedSnapshots.map(function(snap) {
                      return (
                        <div key={snap.id} style={{ display: "flex", alignItems: "center", gap: 8,
                          padding: "8px 10px", background: "rgba(255,255,255,0.03)",
                          borderRadius: 6, border: "1px solid rgba(255,255,255,0.06)" }}>
                          <div style={{ flex: 1 }}>
                            <div style={{ color: "#fff", fontSize: 12, fontFamily: "inherit" }}>{snap.name}</div>
                            <div style={{ color: "rgba(255,255,255,0.3)", fontSize: 9, fontFamily: "inherit" }}>
                              {snap.date} | {snap.data.devices && snap.data.devices.length} devs, {snap.data.connections && snap.data.connections.length} cables
                            </div>
                          </div>
                          <button onClick={function() { loadSnapshot(snap); }}
                            style={btnStyle("rgba(0,206,201,0.15)","rgba(0,206,201,0.3)","#00CEC9")}>Cargar</button>
                          <button onClick={function() { deleteSnapshot(snap.id); }}
                            style={btnStyle("rgba(255,80,80,0.1)","rgba(255,80,80,0.2)","#ff5050")}>x</button>
                        </div>
                      );
                    })}
                  </div>
                )}
                <button onClick={function() { setShowSnapshots(false); }}
                  style={{ padding: "8px", background: "rgba(255,255,255,0.06)",
                    border: "1px solid rgba(255,255,255,0.1)", borderRadius: 6,
                    color: "rgba(255,255,255,0.4)", fontSize: 12, cursor: "pointer", fontFamily: "inherit" }}>Cerrar</button>
              </div>
            </div>
          ) : null}

          {/* Hover tooltip */}
          {hoveredPort && !connecting ? (function() {
            var dev = devices.find(function(d) { return d.id === hoveredPort.devId; });
            if (!dev) return null;
            var port = dev.ports.find(function(p) { return p.id === hoveredPort.portId; });
            if (!port) return null;
            var conns = connections.filter(function(c) {
              return (c.from.device === hoveredPort.devId && c.from.port === hoveredPort.portId) ||
                     (c.to.device === hoveredPort.devId && c.to.port === hoveredPort.portId);
            });
            var kc = { audio: "#00CEC9", midi: "#E8B931", cv: "#E84393", digital: "#74B9FF" };
            var portColor = kc[port.kind] || "#fff";
            return (
              <div style={{ position: "absolute", left: hoveredPort.sx + 14, top: hoveredPort.sy - 10,
                background: "rgba(10,10,18,0.97)", border: "1px solid " + portColor + "55",
                borderRadius: 6, padding: "7px 11px", zIndex: 60, pointerEvents: "none",
                minWidth: 140, maxWidth: 260, backdropFilter: "blur(8px)" }}>
                <div style={{ color: portColor, fontSize: 10, fontWeight: 700, fontFamily: "inherit", marginBottom: 3 }}>
                  {dev.name} / {port.name}
                </div>
                <div style={{ color: "rgba(255,255,255,0.35)", fontSize: 9, fontFamily: "inherit", marginBottom: conns.length > 0 ? 5 : 0 }}>
                  {port.kind} | {port.dir}
                </div>
                {conns.length === 0 ? (
                  <div style={{ color: "rgba(255,255,255,0.25)", fontSize: 9, fontFamily: "inherit" }}>Sin conexiones</div>
                ) : conns.map(function(c, i) {
                  var isFrom = c.from.device === hoveredPort.devId && c.from.port === hoveredPort.portId;
                  var otherDevId = isFrom ? c.to.device : c.from.device;
                  var otherPortId = isFrom ? c.to.port : c.from.port;
                  var otherDev = devices.find(function(d) { return d.id === otherDevId; });
                  var otherPort = otherDev && otherDev.ports.find(function(p) { return p.id === otherPortId; });
                  return (
                    <div key={i} style={{ display: "flex", alignItems: "center", gap: 5,
                      padding: "2px 0", borderTop: i > 0 ? "1px solid rgba(255,255,255,0.05)" : "none" }}>
                      <span style={{ color: portColor, fontSize: 9 }}>{isFrom ? "→" : "←"}</span>
                      <span style={{ color: "rgba(255,255,255,0.7)", fontSize: 9, fontFamily: "inherit" }}>
                        {otherDev ? otherDev.name : "?"} / {otherPort ? otherPort.name : "?"}
                      </span>
                      {c.label ? <span style={{ color: "rgba(255,255,255,0.35)", fontSize: 8, fontFamily: "inherit" }}>({c.label})</span> : null}
                    </div>
                  );
                })}
                {conns.length > 0 ? (
                  <div style={{ color: "rgba(255,255,255,0.2)", fontSize: 8, fontFamily: "inherit", marginTop: 4 }}>
                    Click para resaltar
                  </div>
                ) : null}
              </div>
            );
          })() : null}

          {/* User Layouts Modal */}
          {showUserLayouts ? (
            <div style={{ position: "absolute", top: 0, left: 0, right: 0, bottom: 0,
              background: "rgba(0,0,0,0.7)", zIndex: 50, display: "flex", alignItems: "center", justifyContent: "center" }}
              onClick={function() { setShowUserLayouts(false); }}>
              <div onClick={function(e) { e.stopPropagation(); }}
                style={{ background: "rgba(18,18,28,0.99)", border: "1px solid rgba(232,185,49,0.2)",
                  borderRadius: 12, padding: 22, width: 460, maxHeight: "80vh",
                  display: "flex", flexDirection: "column", gap: 12 }}>
                <h3 style={{ color: "#fff", margin: 0, fontSize: 14, fontFamily: "inherit", fontWeight: 600 }}>
                  ★ Mis Layouts
                </h3>
                <p style={{ color: "rgba(255,255,255,0.3)", margin: 0, fontSize: 11, fontFamily: "inherit" }}>
                  Guarda la posicion actual de los modulos. Las conexiones no se tocan.
                </p>

                {/* Save current layout */}
                <div style={{ display: "flex", gap: 8 }}>
                  <input
                    placeholder="Nombre del layout (ej: Mi setup favorito)"
                    value={newLayoutName}
                    onChange={function(e) { setNewLayoutName(e.target.value); }}
                    onKeyDown={function(e) { if (e.key === "Enter") saveUserLayout(newLayoutName); }}
                    style={{ flex: 1, background: "rgba(255,255,255,0.06)",
                      border: "1px solid rgba(255,255,255,0.12)", borderRadius: 6,
                      padding: "7px 10px", color: "#fff", fontSize: 12, fontFamily: "inherit" }} />
                  <button onClick={function() { saveUserLayout(newLayoutName); }}
                    style={{ padding: "7px 14px", background: "rgba(232,185,49,0.2)",
                      border: "1px solid rgba(232,185,49,0.4)", borderRadius: 6,
                      color: "#E8B931", fontSize: 12, cursor: "pointer", fontFamily: "inherit", fontWeight: 600,
                      whiteSpace: "nowrap" }}>
                    Guardar actual
                  </button>
                </div>

                {/* List of saved layouts */}
                <div style={{ flex: 1, overflow: "auto", display: "flex", flexDirection: "column", gap: 6 }}>
                  {userLayouts.length === 0 ? (
                    <div style={{ color: "rgba(255,255,255,0.2)", fontSize: 12, fontFamily: "inherit",
                      textAlign: "center", padding: "20px 0" }}>
                      No hay layouts guardados. Acomoda los modulos como quieras y dale "Guardar actual".
                    </div>
                  ) : userLayouts.slice().reverse().map(function(layout) {
                    return (
                      <div key={layout.id} style={{ display: "flex", alignItems: "center", gap: 8,
                        padding: "9px 12px", background: "rgba(255,255,255,0.03)",
                        border: "1px solid rgba(255,255,255,0.06)", borderRadius: 7 }}>
                        <div style={{ flex: 1 }}>
                          <div style={{ color: "#fff", fontSize: 12, fontFamily: "inherit", fontWeight: 600 }}>
                            {layout.name}
                          </div>
                          <div style={{ color: "rgba(255,255,255,0.25)", fontSize: 9, fontFamily: "inherit", marginTop: 2 }}>
                            {layout.date} | {Object.keys(layout.positions).length} modulos
                          </div>
                        </div>
                        <button onClick={function() { loadUserLayout(layout); setShowUserLayouts(false); }}
                          style={{ padding: "5px 12px", background: "rgba(232,185,49,0.15)",
                            border: "1px solid rgba(232,185,49,0.3)", borderRadius: 5,
                            color: "#E8B931", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>
                          Cargar
                        </button>
                        <button onClick={function() { deleteUserLayout(layout.id); }}
                          style={{ padding: "5px 8px", background: "rgba(255,80,80,0.1)",
                            border: "1px solid rgba(255,80,80,0.2)", borderRadius: 5,
                            color: "#ff5050", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>
                          x
                        </button>
                      </div>
                    );
                  })}
                </div>

                <button onClick={function() { setShowUserLayouts(false); }}
                  style={{ padding: "8px", background: "rgba(255,255,255,0.06)",
                    border: "1px solid rgba(255,255,255,0.1)", borderRadius: 6,
                    color: "rgba(255,255,255,0.4)", fontSize: 12, cursor: "pointer", fontFamily: "inherit" }}>
                  Cerrar
                </button>
              </div>
            </div>
          ) : null}

          {/* Toast */}
          {toastMsg ? (
            <div style={{ position: "absolute", top: 52, left: "50%", transform: "translateX(-50%)",
              background: "rgba(12,12,22,0.97)", border: "1px solid rgba(0,206,201,0.4)",
              borderRadius: 8, padding: "7px 18px", zIndex: 60, backdropFilter: "blur(12px)" }}>
              <span style={{ color: "#00CEC9", fontSize: 12, fontFamily: "inherit" }}>{toastMsg}</span>
            </div>
          ) : null}

          {/* Help */}
          <div style={{ position: "absolute", bottom: 12, right: 14, color: "rgba(255,255,255,0.18)",
            fontSize: 9, fontFamily: "inherit", textAlign: "right", lineHeight: 1.6, zIndex: 10 }}>
            Click puerto = conectar | Shift+click puerto = resaltar conexiones | Shift+click nodo = seleccion multiple | Ctrl+click cable = multi-cables | Esc = cancelar
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(React.createElement(StudioRouter, null));
  </script>
</body>
</html>
