    // ─── HELPERS ───
    function getPortPos(deviceId, portId, devices) {
      var dev = devices.find(function(d) { return d.id === deviceId; });
      if (!dev) return { x: 0, y: 0 };
      var port = dev.ports.find(function(p) { return p.id === portId; });
      if (!port) return { x: dev.x, y: dev.y };
      var isOut = port.dir === "out";
      var list = isOut
        ? dev.ports.filter(function(p) { return p.dir === "out" || p.dir === "both"; })
        : dev.ports.filter(function(p) { return p.dir === "in" || p.dir === "both"; });
      var idx = list.indexOf(port);
      if (idx < 0) idx = 0;
      return {
        x: isOut ? dev.x + NODE_W : dev.x,
        y: dev.y + HEADER_H + PORT_PAD + idx * (PORT_H + PORT_PAD) + PORT_H / 2,
      };
    }

    function nodeHeight(dev) {
      var inP = dev.ports.filter(function(p) { return p.dir === "in" || p.dir === "both"; }).length;
      var outP = dev.ports.filter(function(p) { return p.dir === "out" || p.dir === "both"; }).length;
      var base = HEADER_H + Math.max(inP, outP) * (PORT_H + PORT_PAD) + PORT_PAD * 2;
      return dev.notes ? base + 28 : base;
    }

    // ─── MAIN COMPONENT ───
    function StudioRouter() {
      var [devices, setDevices] = useState([]);
      var [connections, setConnections] = useState([]);
      var [stickyNotes, setStickyNotes] = useState([]);
      var [selected, setSelected] = useState(null);
      var [multiSelect, setMultiSelect] = useState([]);
      var [selectedConn, setSelectedConn] = useState(null);
      var [multiSelectConn, setMultiSelectConn] = useState([]);
      var [connecting, setConnecting] = useState(null);
      var [dragging, setDragging] = useState(null);
      var [draggingNote, setDraggingNote] = useState(null);
      var [pan, setPan] = useState({ x: 0, y: 0 });
      var [zoom, setZoom] = useState(0.55);
      var [isPanning, setIsPanning] = useState(false);
      var [panStart, setPanStart] = useState(null);
      var [mousePos, setMousePos] = useState({ x: 0, y: 0 });
      var [filter, setFilter] = useState("all");
      var [modeFilter, setModeFilter] = useState("all");
      var [showAdd, setShowAdd] = useState(false);
      var [newDevice, setNewDevice] = useState({ name: "", type: "synth", color: "#00B894" });
      var [newPorts, setNewPorts] = useState([]);
      var [editingDeviceNote, setEditingDeviceNote] = useState(null);
      var [editingPorts, setEditingPorts] = useState(null);
      var [toastMsg, setToastMsg] = useState("");
      var [showExportModal, setShowExportModal] = useState(false);
      var [exportData, setExportData] = useState("");
      var [showImportModal, setShowImportModal] = useState(false);
      var [importText, setImportText] = useState("");
      var [savedSnapshots, setSavedSnapshots] = useState([]);
      var [showSnapshots, setShowSnapshots] = useState(false);
      var [selectedNote, setSelectedNote] = useState(null);
      var [hoveredPort, setHoveredPort] = useState(null);
      var [globalCableW, setGlobalCableW] = useState(2);
      var [globalCableOp, setGlobalCableOp] = useState(0.6);
      var [showCableStyle, setShowCableStyle] = useState(false);
      var [showLayouts, setShowLayouts] = useState(false);
      var [userLayouts, setUserLayouts] = useState([]);
      var [showUserLayouts, setShowUserLayouts] = useState(false);
      var [newLayoutName, setNewLayoutName] = useState("");
      var [hoveredConn, setHoveredConn] = useState(null);
      var [cableStyle, setCableStyle] = useState("bezier");
      var [isAnimating, setIsAnimating] = useState(false); // "bezier" or "ortho"  // {devId, portId, x, y}
      var [focusedPort, setFocusedPort] = useState(null); // {devId, portId}
      var [draggingNote2, setDraggingNote2] = useState(null);

      var svgRef = useRef(null);
      var fileInputRef = useRef(null);
      var loaded = useRef(false);

      // ── Load from localStorage ──
      useEffect(function() {
        if (loaded.current) return;
        loaded.current = true;
        try {
          var raw = localStorage.getItem("studio-router-data");
          if (raw) {
            var d = JSON.parse(raw);
            setDevices(d.devices || DEFAULT_DEVICES);
            setConnections(d.connections || []);
            setStickyNotes(d.stickyNotes || []);
            if (d.pan) setPan(d.pan);
            if (d.zoom) setZoom(d.zoom);
            return;
          }
        } catch(e) {}
        setDevices(DEFAULT_DEVICES);
        try {
          var snaps = localStorage.getItem("studio-router-snapshots");
          if (snaps) setSavedSnapshots(JSON.parse(snaps));
        } catch(e) {}
        try {
          var uls = localStorage.getItem("studio-router-user-layouts");
          if (uls) setUserLayouts(JSON.parse(uls));
        } catch(e) {}
      }, []);

      // ── Auto-save ──
      useEffect(function() {
        if (!loaded.current || devices.length === 0) return;
        try {
          localStorage.setItem("studio-router-data", JSON.stringify({
            devices: devices, connections: connections,
            stickyNotes: stickyNotes, pan: pan, zoom: zoom,
          }));
        } catch(e) {}
      }, [devices, connections, stickyNotes, pan, zoom]);

      function showToast(msg) {
        setToastMsg(msg);
        setTimeout(function() { setToastMsg(""); }, 3000);
      }

      function screenToWorld(sx, sy) {
        return { x: (sx - pan.x) / zoom, y: (sy - pan.y) / zoom };
      }

      // ── Wheel zoom ──
      function handleWheel(e) {
        e.preventDefault();
        var delta = e.deltaY > 0 ? 0.92 : 1.08;
        var nz = Math.max(0.15, Math.min(2.5, zoom * delta));
        var rect = svgRef.current.getBoundingClientRect();
        var mx = e.clientX - rect.left;
        var my = e.clientY - rect.top;
        setPan(function(p) {
          return { x: mx - (mx - p.x) * (nz / zoom), y: my - (my - p.y) * (nz / zoom) };
        });
        setZoom(nz);
      }

      // ── Pointer events ──
      function handlePointerDown(e) {
        if (e.target === svgRef.current || e.target.classList.contains("bg-grid")) {
          if (connecting) { setConnecting(null); return; }
          setIsPanning(true);
          setPanStart({ x: e.clientX - pan.x, y: e.clientY - pan.y });
          setSelected(null);
          setSelectedConn(null);
          setMultiSelect([]);
          setMultiSelectConn([]);
          setFocusedPort(null);
          setShowLayouts(false);
          setShowCableStyle(false);
          setShowUserLayouts(false);
        }
      }

      function handlePointerMove(e) {
        var rect = svgRef.current.getBoundingClientRect();
        var sx = e.clientX - rect.left;
        var sy = e.clientY - rect.top;
        setMousePos(screenToWorld(sx, sy));
        if (isPanning && panStart) {
          setPan({ x: e.clientX - panStart.x, y: e.clientY - panStart.y });
          return;
        }
        if (draggingNote2) {
          var w2 = screenToWorld(sx, sy);
          setStickyNotes(function(ns) {
            return ns.map(function(n) {
              if (n.id !== draggingNote2.id) return n;
              return { id: n.id, x: w2.x - draggingNote2.ox, y: w2.y - draggingNote2.oy, text: n.text, color: n.color, w: n.w };
            });
          });
          return;
        }
        if (!dragging) return;
        var w = screenToWorld(sx, sy);
        var devNow = devices.find(function(d) { return d.id === dragging.id; });
        if (!devNow) return;
        var newX = w.x - dragging.ox;
        var newY = w.y - dragging.oy;
        var dx = newX - devNow.x;
        var dy = newY - devNow.y;
        setDevices(function(ds) {
          return ds.map(function(d) {
            if (multiSelect.length > 0 && multiSelect.indexOf(d.id) >= 0) {
              return { id: d.id, name: d.name, type: d.type, color: d.color,
                x: d.x + dx, y: d.y + dy, ports: d.ports, notes: d.notes };
            }
            if (d.id === dragging.id && multiSelect.length === 0) {
              return { id: d.id, name: d.name, type: d.type, color: d.color,
                x: newX, y: newY, ports: d.ports, notes: d.notes };
            }
            return d;
          });
        });
      }

      function handlePointerUp() {
        setDragging(null);
        setDraggingNote2(null);
        setIsPanning(false);
        setPanStart(null);
      }

      function startDrag(dev, e) {
        e.stopPropagation();
        var rect = svgRef.current.getBoundingClientRect();
        var w = screenToWorld(e.clientX - rect.left, e.clientY - rect.top);
        if (e.shiftKey) {
          var devId = dev.id;
          setMultiSelect(function(ms) {
            if (ms.indexOf(devId) >= 0) return ms.filter(function(id) { return id !== devId; });
            return ms.concat([devId]);
          });
          setSelected(null);
          return;
        }
        if (multiSelect.length > 0 && multiSelect.indexOf(dev.id) >= 0) {
          setDragging({ id: dev.id, ox: w.x - dev.x, oy: w.y - dev.y });
          setSelected(null);
        } else {
          setDragging({ id: dev.id, ox: w.x - dev.x, oy: w.y - dev.y });
          setSelected(dev.id);
          setMultiSelect([]);
        }
        setSelectedConn(null);
      }

      function startConnect(devId, portId, e) {
        e.stopPropagation();
        if (connecting) {
          if (connecting.devId !== devId) {
            var srcPort = devices.find(function(d) { return d.id === connecting.devId; });
            srcPort = srcPort && srcPort.ports.find(function(p) { return p.id === connecting.portId; });
            var tgtPort = devices.find(function(d) { return d.id === devId; });
            tgtPort = tgtPort && tgtPort.ports.find(function(p) { return p.id === portId; });
            if (srcPort && tgtPort) {
              setConnections(function(cs) {
                return cs.concat([{
                  id: "c-" + Date.now(),
                  from: { device: connecting.devId, port: connecting.portId },
                  to: { device: devId, port: portId },
                  kind: srcPort.kind, label: "", mode: "all",
                }]);
              });
            }
          }
          setConnecting(null);
        } else {
          setConnecting({ devId: devId, portId: portId });
        }
      }

      function deleteDevice(id) {
        setDevices(function(ds) { return ds.filter(function(d) { return d.id !== id; }); });
        setConnections(function(cs) { return cs.filter(function(c) { return c.from.device !== id && c.to.device !== id; }); });
        setSelected(null);
      }

      function deleteMultiple() {
        var ids = multiSelect;
        setDevices(function(ds) { return ds.filter(function(d) { return ids.indexOf(d.id) < 0; }); });
        setConnections(function(cs) { return cs.filter(function(c) { return ids.indexOf(c.from.device) < 0 && ids.indexOf(c.to.device) < 0; }); });
        setMultiSelect([]);
      }

      function deleteConnection(id) {
        setConnections(function(cs) { return cs.filter(function(c) { return c.id !== id; }); });
        setSelectedConn(null);
      }

      function deleteMultipleConnections() {
        var ids = multiSelectConn;

        setMultiSelectConn([]);
      }

      function addDevice() {
        if (!newDevice.name.trim()) return;

        setDevices(function(ds) {

      function addStickyNote() {

        setStickyNotes(function(ns) { return ns.concat([note]); });

      function deleteStickyNote(id) {

      function saveSnapshot(name) {

        var snap = { id: "snap-" + Date.now(), name: name || timestamp, date: timestamp,

      function exportJSON() {

      function resetToDefaults() {
        setDevices(DEFAULT_DEVICES);
        setConnections([]);
        setStickyNotes([]);
        setMultiSelect([]);
        setMultiSelectConn([]);
        setPan({ x: 60, y: 60 });

      function animateTo(targetPositions) {
        var startPositions = {};
        devices.forEach(function(d) { startPositions[d.id] = { x: d.x, y: d.y }; });
        var start = null;
        var duration = 600;
        setIsAnimating(true);
        function step(ts) {
          if (!start) start = ts;
          var progress = Math.min((ts - start) / duration, 1);
          var ease = 1 - Math.pow(1 - progress, 3);
          setDevices(function(ds) {
            return ds.map(function(d) {
              var from = startPositions[d.id] || { x: d.x, y: d.y };
              var to = targetPositions[d.id] || { x: d.x, y: d.y };
              return Object.assign({}, d, {
                x: from.x + (to.x - from.x) * ease,
                y: from.y + (to.y - from.y) * ease,
              });
            });
          });
          if (progress < 1) {
            requestAnimationFrame(step);
          } else {
            setIsAnimating(false);
          }
        }
        requestAnimationFrame(step);
      }

      function calcNodeH(dev) {
        var inP = dev.ports.filter(function(p) { return p.dir === "in" || p.dir === "both"; }).length;
        var outP = dev.ports.filter(function(p) { return p.dir === "out" || p.dir === "both"; }).length;
        var base = 42 + Math.max(inP, outP) * 28 + 12;
        return dev.notes ? base + 28 : base;
      }

      function layoutGrid() {
        var cols = Math.ceil(Math.sqrt(devices.length));
        var gapX = 40, gapY = 40;
        var startX = 60, startY = 80;
        // Calculate max height per row
        var rowHeights = [];
        devices.forEach(function(d, i) {
          var row = Math.floor(i / cols);
          var h = calcNodeH(d);
          rowHeights[row] = Math.max(rowHeights[row] || 0, h);
        });
        var positions = {};
        var colX = startX;
        var colWidths = [];
        for (var c = 0; c < cols; c++) {
          colWidths[c] = NODE_W + gapX;
        }
        devices.forEach(function(d, i) {
          var col = i % cols;
          var row = Math.floor(i / cols);
          var cx = startX + col * (NODE_W + gapX);
          var cy = startY;
          for (var r = 0; r < row; r++) {
            cy += (rowHeights[r] || 200) + gapY;
          }
          positions[d.id] = { x: cx, y: cy };
        });
        animateTo(positions);
        setTimeout(function() { fitToView(); }, 650);
      }

      function layoutByType() {
        var typeGroups = {
          sequencer: [], "midi-router": [], "midi-hub": [], controller: [],
          synth: [], "drum-machine": [], sampler: [], modular: [],
          mixer: [], effect: [], patchbay: [],
          interface: [], preamp: [], converter: [], clock: [],
          monitor: [], mic: [], tablet: [],
        };
        devices.forEach(function(d) {
          var grp = typeGroups[d.type];
          if (!grp) grp = typeGroups.synth;
          grp.push(d);
        });
        var positions = {};
        var colX = 60;
        var gapX = 40, gapY = 30;
        Object.keys(typeGroups).forEach(function(type) {
          var group = typeGroups[type];
          if (group.length === 0) return;
          var y = 80;
          group.forEach(function(d) {
            positions[d.id] = { x: colX, y: y };
            y += calcNodeH(d) + gapY;
          });
          colX += NODE_W + gapX;
        });
        animateTo(positions);
        setTimeout(function() { fitToView(); }, 650);
      }

      function layoutSignalFlow() {
        var columns = {
          sources:    ["hapax", "octatrack", "rytm", "hydra", "pro2", "td3", "subphatty", "ipad", "sv100", "fcone", "twister"],
          controllers: ["mrcc", "rk004", "misslink", "usamo", "metamod", "mutbrain"],
          processing: ["h9", "heat", "rat", "optxv2"],
          routing:    ["spatch", "fx16ii"],
          capture:    ["motu", "octopre"],
          output:     ["mondesk", "monjam", "sub", "pc", "modular"],
        };
        var colKeys = Object.keys(columns);
        var positions = {};
        var colX = 60;
        var gapX = 40, gapY = 30;
        colKeys.forEach(function(col) {
          var ids = columns[col];
          var devInCol = devices.filter(function(d) { return ids.indexOf(d.id) >= 0; });
          if (col === "sources") {
            devices.forEach(function(d) {
              var found = false;
              colKeys.forEach(function(k) { if (columns[k].indexOf(d.id) >= 0) found = true; });
              if (!found) devInCol.push(d);
            });
          }
          if (devInCol.length === 0) return;
          var y = 80;
          devInCol.forEach(function(d) {
            positions[d.id] = { x: colX, y: y };
            y += calcNodeH(d) + gapY;
          });
          colX += NODE_W + gapX;
        });
        animateTo(positions);
        setTimeout(function() { fitToView(); }, 650);
      }

      function layoutCircular() {
        var radius = Math.max(500, devices.length * 55);
        var cx = radius + NODE_W;
        var cy = radius + 100;
        var positions = {};
        devices.forEach(function(d, i) {
          var angle = (i / devices.length) * 2 * Math.PI - Math.PI / 2;
          positions[d.id] = {
            x: cx + Math.cos(angle) * radius - NODE_W / 2,
            y: cy + Math.sin(angle) * radius - 60,
          };
        });
        animateTo(positions);
        // After animation, fit to view
        setTimeout(function() { fitToView(); }, 650);
      }

      function saveUserLayout(name) {
        if (!name || !name.trim()) return;
        var positions = {};
        devices.forEach(function(d) { positions[d.id] = { x: d.x, y: d.y }; });
        var layout = {
          id: "ul-" + Date.now(),
          name: name.trim(),
          date: new Date().toISOString().slice(0, 19).replace("T", " "),
          positions: positions,
        };
        var updated = userLayouts.concat([layout]);
        setUserLayouts(updated);
        try { localStorage.setItem("studio-router-user-layouts", JSON.stringify(updated)); } catch(e) {}
        setNewLayoutName("");
        showToast("Layout guardado: " + layout.name);
      }

      function loadUserLayout(layout) {
        var positions = layout.positions;
        // Only move devices that exist in both layout and current devices
        setDevices(function(ds) {
          return ds.map(function(d) {
            if (positions[d.id]) {
              return Object.assign({}, d, { x: positions[d.id].x, y: positions[d.id].y });
            }
            return d;
          });
        });
        setTimeout(function() { fitToView(); }, 100);
        showToast("Layout cargado: " + layout.name);
      }

      function deleteUserLayout(id) {
        var updated = userLayouts.filter(function(l) { return l.id !== id; });
        setUserLayouts(updated);
        try { localStorage.setItem("studio-router-user-layouts", JSON.stringify(updated)); } catch(e) {}
      }

      function fitToView() {
        if (devices.length === 0) return;
        var svgEl = svgRef.current;
        if (!svgEl) return;
        var vw = svgEl.clientWidth || window.innerWidth;
        var vh = svgEl.clientHeight || window.innerHeight;
        var pad = 60;
        // Calculate bounding box of all devices
        var minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
        devices.forEach(function(d) {
          var h = calcNodeH(d);
          minX = Math.min(minX, d.x);
          minY = Math.min(minY, d.y);
          maxX = Math.max(maxX, d.x + NODE_W);
          maxY = Math.max(maxY, d.y + h);
        });
        var contentW = maxX - minX;
        var contentH = maxY - minY;
        var scaleX = (vw - pad * 2) / contentW;
        var scaleY = (vh - pad * 2) / contentH;
        var newZoom = Math.min(scaleX, scaleY, 1.0);
        newZoom = Math.max(newZoom, 0.15);
        var newPanX = pad - minX * newZoom + ((vw - pad * 2) - contentW * newZoom) / 2;
        var newPanY = pad - minY * newZoom + ((vh - pad * 2) - contentH * newZoom) / 2;
        // Account for toolbar height
        newPanY += 22;
        setZoom(newZoom);
        setPan({ x: newPanX, y: newPanY });
      }

      function resetView() {
        fitToView();
      }

      var filteredConns = connections.filter(function(c) {
        if (filter !== "all" && c.kind !== filter) return false;
        if (modeFilter !== "all" && c.mode !== "all" && c.mode !== modeFilter) return false;
        return true;
      });

      var btnStyle = function(bg, border, color) {
        return { padding: "5px 12px", fontSize: 11, background: bg, border: "1px solid " + border,
          borderRadius: 4, color: color, cursor: "pointer", fontFamily: "inherit", letterSpacing: 0.5 };
      };

      var inputSt = { background: "rgba(255,255,255,0.06)", border: "1px solid rgba(255,255,255,0.12)",
        borderRadius: 4, padding: "5px 8px", color: "#fff", fontSize: 11, fontFamily: "inherit" };
      var selectSt = Object.assign({}, inputSt, { padding: "5px 4px" });

      return (
        <div style={{ width: "100%", height: "100vh", background: "#0a0a0f", overflow: "hidden",
          fontFamily: "'JetBrains Mono','SF Mono','Fira Code',monospace", position: "relative" }}>

          {/* Toolbar */}
          <div style={{ position: "absolute", top: 0, left: 0, right: 0, zIndex: 20,
            background: "rgba(12,12,20,0.97)", borderBottom: "1px solid rgba(255,255,255,0.06)",
            padding: "7px 14px", display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
            <span style={{ fontSize: 14, fontWeight: 700, color: "#fff", letterSpacing: 2, marginRight: 4 }}>
              <span style={{ color: "#00CEC9" }}>◈</span> STUDIO ROUTER
            </span>
            <div style={{ width: 1, height: 18, background: "rgba(255,255,255,0.1)" }} />
            {["all","audio","midi","cv","digital"].map(function(f) {
              var kc = KIND_COLORS[f];
              var active = filter === f;
              return (
                <button key={f} onClick={function() { setFilter(f); }}
                  style={btnStyle(
                    active ? (kc ? kc.line + "22" : "rgba(255,255,255,0.12)") : "transparent",
                    active ? (kc ? kc.line : "rgba(255,255,255,0.3)") : "rgba(255,255,255,0.08)",
                    active ? (kc ? kc.line : "#fff") : "rgba(255,255,255,0.4)"
                  )}>
                  {f === "all" ? "Todos" : kc ? kc.label : f}
                </button>
              );
            })}
            <div style={{ width: 1, height: 18, background: "rgba(255,255,255,0.1)" }} />
            {["all","daw","jam"].map(function(m) {
              return (
                <button key={m} onClick={function() { setModeFilter(m); }}
                  style={btnStyle(
                    modeFilter === m ? "rgba(232,185,49,0.15)" : "transparent",
                    modeFilter === m ? "#E8B931" : "rgba(255,255,255,0.08)",
                    modeFilter === m ? "#E8B931" : "rgba(255,255,255,0.4)"
                  )}>
                  {m === "all" ? "Ambos" : m.toUpperCase()}
                </button>
              );
            })}
            <div style={{ flex: 1 }} />
            {multiSelect.length > 0 && (
              <button onClick={deleteMultiple} style={btnStyle("rgba(255,80,80,0.12)","rgba(255,80,80,0.4)","#ff5050")}>
                Borrar nodos ({multiSelect.length})
              </button>
            )}
            {multiSelectConn.length > 0 && (
              <button onClick={deleteMultipleConnections} style={btnStyle("rgba(232,185,49,0.12)","rgba(232,185,49,0.4)","#E8B931")}>
                Borrar cables ({multiSelectConn.length})
              </button>
            )}
            <button onClick={function() { setShowAdd(true); }} style={btnStyle("rgba(0,206,201,0.15)","#00CEC9","#00CEC9")}>
              + DISPOSITIVO
            </button>
            <button onClick={addStickyNote} style={btnStyle("rgba(255,234,167,0.12)","rgba(255,234,167,0.4)","#FFEAA7")}>
              + NOTA
            </button>
            <div style={{ width: 1, height: 18, background: "rgba(255,255,255,0.1)" }} />
            <button onClick={function() { saveSnapshot(); }} style={btnStyle("rgba(0,206,201,0.08)","rgba(0,206,201,0.3)","rgba(0,206,201,0.7)")}>
              Guardar
            </button>
            <button onClick={function() { setShowSnapshots(true); }} style={btnStyle("rgba(116,185,255,0.08)","rgba(116,185,255,0.3)","rgba(116,185,255,0.7)")}>
              Versiones {savedSnapshots.length > 0 ? "(" + savedSnapshots.length + ")" : ""}
            </button>
            <button onClick={exportJSON} style={btnStyle("rgba(255,255,255,0.05)","rgba(255,255,255,0.1)","rgba(255,255,255,0.4)")}>
              Copiar JSON
            </button>
            <button onClick={function() { setShowImportModal(true); }} style={btnStyle("rgba(255,255,255,0.05)","rgba(255,255,255,0.1)","rgba(255,255,255,0.4)")}>
              Pegar JSON
            </button>
            <button onClick={resetView} style={btnStyle("rgba(255,255,255,0.05)","rgba(255,255,255,0.1)","rgba(255,255,255,0.4)")}>
              Vista
            </button>
            <div style={{ position: "relative" }}>
              <button onClick={function() { setShowLayouts(function(v) { return !v; }); }}
                style={btnStyle("rgba(116,185,255,0.08)","rgba(116,185,255,0.3)","rgba(116,185,255,0.7)")}>
                ⊞ Layout
              </button>
              {showLayouts ? (
                <div style={{ position: "absolute", top: 34, right: 0, background: "rgba(12,12,22,0.98)",
                  border: "1px solid rgba(116,185,255,0.2)", borderRadius: 8, padding: 8,
                  display: "flex", flexDirection: "column", gap: 5, zIndex: 100, minWidth: 160,
                  backdropFilter: "blur(12px)" }}>
                  {[
                    { key: "grid", label: "⊞  Grid", desc: "Cuadricula ordenada" },
                    { key: "type", label: "⊟  Por Tipo", desc: "Agrupado por categoria" },
                    { key: "flow", label: "→  Flujo de Senal", desc: "Fuentes a salidas" },
                    { key: "circle", label: "◎  Circular", desc: "Vista central" },
                  ].map(function(l) {
                    return (
                      <button key={l.key} onClick={function() {
                        setShowLayouts(false);
                        if (l.key === "grid") layoutGrid();
                        else if (l.key === "type") layoutByType();
                        else if (l.key === "flow") layoutSignalFlow();
                        else if (l.key === "circle") layoutCircular();
                      }} style={{ padding: "7px 12px", background: "rgba(255,255,255,0.04)",
                        border: "1px solid rgba(255,255,255,0.07)", borderRadius: 5,
                        color: "#fff", fontSize: 11, cursor: "pointer", fontFamily: "inherit",
                        textAlign: "left", display: "flex", flexDirection: "column", gap: 1 }}>
                        <span>{l.label}</span>
                        <span style={{ color: "rgba(255,255,255,0.3)", fontSize: 9 }}>{l.desc}</span>
                      </button>
                    );
                  })}
                  <div style={{ borderTop: "1px solid rgba(255,255,255,0.07)", marginTop: 4, paddingTop: 6 }}>
                    <button onClick={function() { setShowLayouts(false); setShowUserLayouts(true); }}
                      style={{ width: "100%", padding: "7px 12px", background: "rgba(232,185,49,0.08)",
                        border: "1px solid rgba(232,185,49,0.2)", borderRadius: 5,
                        color: "#E8B931", fontSize: 11, cursor: "pointer", fontFamily: "inherit",
                        textAlign: "left", display: "flex", flexDirection: "column", gap: 1 }}>
                      <span>★  Mis Layouts {userLayouts.length > 0 ? "(" + userLayouts.length + ")" : ""}</span>
                      <span style={{ color: "rgba(232,185,49,0.5)", fontSize: 9 }}>Guardar y cargar posiciones</span>
                    </button>
                  </div>
                </div>
              ) : null}
            </div>
            <button onClick={function() { setShowCableStyle(function(v) { return !v; }); }}
              style={btnStyle(showCableStyle ? "rgba(0,206,201,0.15)" : "rgba(255,255,255,0.05)", showCableStyle ? "#00CEC9" : "rgba(255,255,255,0.1)", showCableStyle ? "#00CEC9" : "rgba(255,255,255,0.4)")}>
              Cables
            </button>
            <button onClick={resetToDefaults} style={btnStyle("rgba(255,80,80,0.08)","rgba(255,80,80,0.2)","rgba(255,80,80,0.6)")}>
              Reset
            </button>
            <span style={{ fontSize: 10, color: "rgba(255,255,255,0.2)" }}>{Math.round(zoom * 100)}%</span>
          </div>

          {/* Global cable style panel */}
          {showCableStyle ? (
            <div style={{ position: "absolute", top: 44, right: 14, zIndex: 25,
              background: "rgba(12,12,22,0.97)", border: "1px solid rgba(0,206,201,0.2)",
              borderRadius: 8, padding: "12px 16px", display: "flex", flexDirection: "column", gap: 10,
              backdropFilter: "blur(12px)", minWidth: 220 }}>
              <div style={{ color: "rgba(255,255,255,0.5)", fontSize: 10, fontFamily: "inherit", letterSpacing: 1 }}>
                ESTILO GLOBAL DE CABLES
              </div>
              <div style={{ display: "flex", gap: 6 }}>
              {[
                { key: "bezier", label: "~ Curvas" },
                { key: "ortho",  label: "⌐ Ortogonal" },
                { key: "straight", label: "/ Rectos" },
              ].map(function(s) {
                var active = cableStyle === s.key;
                return (
                  <button key={s.key} onClick={function() { setCableStyle(s.key); }}
                    style={{ flex: 1, padding: "6px 4px", fontSize: 10, fontFamily: "inherit",
                      cursor: "pointer", borderRadius: 5,
                      background: active ? "rgba(0,206,201,0.2)" : "rgba(255,255,255,0.04)",
                      border: "1px solid " + (active ? "#00CEC9" : "rgba(255,255,255,0.1)"),
                      color: active ? "#00CEC9" : "rgba(255,255,255,0.4)" }}>
                    {s.label}
                  </button>
                );
              })}
              </div>
              <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                <span style={{ color: "rgba(255,255,255,0.4)", fontSize: 11, fontFamily: "inherit", minWidth: 60 }}>Grosor</span>
                <input type="range" min="1" max="8" step="0.5" value={globalCableW}
                  onChange={function(e) { setGlobalCableW(parseFloat(e.target.value)); }}
                  style={{ flex: 1, accentColor: "#00CEC9" }} />
                <span style={{ color: "#00CEC9", fontSize: 11, fontFamily: "inherit", minWidth: 24 }}>{globalCableW}px</span>
              </div>
              <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                <span style={{ color: "rgba(255,255,255,0.4)", fontSize: 11, fontFamily: "inherit", minWidth: 60 }}>Opacidad</span>
                <input type="range" min="0.05" max="1" step="0.05" value={globalCableOp}
                  onChange={function(e) { setGlobalCableOp(parseFloat(e.target.value)); }}
                  style={{ flex: 1, accentColor: "#00CEC9" }} />
                <span style={{ color: "#00CEC9", fontSize: 11, fontFamily: "inherit", minWidth: 32 }}>{Math.round(globalCableOp * 100)}%</span>
              </div>
              <div style={{ borderTop: "1px solid rgba(255,255,255,0.06)", paddingTop: 8 }}>
                <div style={{ color: "rgba(255,255,255,0.3)", fontSize: 9, fontFamily: "inherit", marginBottom: 6 }}>
                  Los cables con estilo individual mantienen su propio ajuste.
                </div>
                <button onClick={function() {
                  setConnections(function(cs) {
                    return cs.map(function(c) {
                      return Object.assign({}, c, { strokeW: undefined, opacity: undefined });
                    });
                  });
                  setGlobalCableW(2);
                  setGlobalCableOp(0.6);
                }} style={{ width: "100%", padding: "5px", background: "rgba(255,255,255,0.04)",
                  border: "1px solid rgba(255,255,255,0.1)", borderRadius: 4,
                  color: "rgba(255,255,255,0.3)", fontSize: 10, cursor: "pointer", fontFamily: "inherit" }}>
                  Resetear todos a defecto
                </button>
              </div>
            </div>
          ) : null}

          {/* SVG Canvas */}
          <svg ref={svgRef} style={{ width: "100%", height: "100%",
            cursor: isPanning ? "grabbing" : connecting ? "crosshair" : "default" }}
            onWheel={handleWheel}
            onPointerDown={handlePointerDown}
            onPointerMove={handlePointerMove}
            onPointerUp={handlePointerUp}
            onContextMenu={function(e) { e.preventDefault(); setConnecting(null); }}
            tabIndex={0}
            onKeyDown={function(e) { if (e.key === "Escape") { setConnecting(null); setSelected(null); setSelectedConn(null); setMultiSelect([]); setMultiSelectConn([]); setFocusedPort(null); } }}>
            <defs>
              <pattern id="grid" x="0" y="0" width={40 * zoom} height={40 * zoom} patternUnits="userSpaceOnUse">
                <circle cx={pan.x % (40 * zoom)} cy={pan.y % (40 * zoom)} r="0.8" fill="rgba(255,255,255,0.04)" />
              </pattern>
              {Object.keys(KIND_COLORS).map(function(k) {
                return (
                  <filter id={"glow-" + k} key={k}>
                    <feGaussianBlur stdDeviation="4" result="blur" />
                    <feFlood floodColor={KIND_COLORS[k].line} floodOpacity="0.6" />
                    <feComposite in2="blur" operator="in" />
                    <feMerge><feMergeNode /><feMergeNode in="SourceGraphic" /></feMerge>
                  </filter>
                );
              })}
            </defs>
            <rect className="bg-grid" width="100%" height="100%" fill="url(#grid)" />
            <g transform={"translate(" + pan.x + "," + pan.y + ") scale(" + zoom + ")"}>

              {/* Connections */}
              {filteredConns.map(function(conn) {
                var from = getPortPos(conn.from.device, conn.from.port, devices);
                var to = getPortPos(conn.to.device, conn.to.port, devices);
                var kc = KIND_COLORS[conn.kind] || KIND_COLORS.audio;
                var distX = to.x - from.x;
                var distY = to.y - from.y;
                var path;
                if (cableStyle === "ortho") {
                  // Orthogonal: horizontal → vertical → horizontal with rounded corners
                  var midX = from.x + distX * 0.5;
                  var r = Math.min(18, Math.abs(distX) * 0.25, Math.abs(distY) * 0.25);
                  if (Math.abs(distY) < 4) {
                    // Same height - just a horizontal line
                    path = "M" + from.x + "," + from.y + " L" + to.x + "," + to.y;
                  } else if (distX >= 60) {
                    // Target to the right - simple elbow
                    var sy = distY > 0 ? r : -r;
                    path = "M" + from.x + "," + from.y +
                      " L" + (midX - r) + "," + from.y +
                      " Q" + midX + "," + from.y + " " + midX + "," + (from.y + sy) +
                      " L" + midX + "," + (to.y - sy) +
                      " Q" + midX + "," + to.y + " " + (midX + r) + "," + to.y +
                      " L" + to.x + "," + to.y;
                  } else {
                    // Target to left or close - go out then back
                    var outX = from.x + 60;
                    var inX = to.x - 60;
                    var midY = from.y + distY * 0.5;
                    var sy2 = distY > 0 ? r : -r;
                    path = "M" + from.x + "," + from.y +
                      " L" + (outX - r) + "," + from.y +
                      " Q" + outX + "," + from.y + " " + outX + "," + (from.y + sy2) +
                      " L" + outX + "," + (midY - sy2) +
                      " Q" + outX + "," + midY + " " + (outX - r) + "," + midY +
                      " L" + (inX + r) + "," + midY +
                      " Q" + inX + "," + midY + " " + inX + "," + (midY + sy2) +
                      " L" + inX + "," + (to.y - sy2) +
                      " Q" + inX + "," + to.y + " " + (inX + r) + "," + to.y +
                      " L" + to.x + "," + to.y;
                  }
                } else if (cableStyle === "straight") {
                  path = "M" + from.x + "," + from.y + " L" + to.x + "," + to.y;
                } else {
                  // Bezier curves
                  var dist2 = Math.sqrt(distX * distX + distY * distY);
                  var bend = Math.max(80, Math.min(400, Math.abs(distX) * 0.5, dist2 * 0.5));
                  var c1x, c1y, c2x, c2y;
                  if (distX >= 0) {
                    c1x = from.x + bend; c1y = from.y;
                    c2x = to.x - bend;   c2y = to.y;
                  } else {
                    var vOffset = Math.max(80, Math.abs(distY) * 0.4);
                    c1x = from.x + bend; c1y = from.y + (distY > 0 ? vOffset : -vOffset);
                    c2x = to.x - bend;   c2y = to.y + (distY > 0 ? vOffset : -vOffset);
                  }
                  path = "M" + from.x + "," + from.y + " C" + c1x + "," + c1y + " " + c2x + "," + c2y + " " + to.x + "," + to.y;
                }
                var isSel = selectedConn === conn.id;
                var isMSel = multiSelectConn.indexOf(conn.id) >= 0;
                var midX = (from.x + to.x) / 2;
                var midY = (from.y + to.y) / 2;
                var dashed = conn.mode === "jam" ? "6,4" : conn.mode === "daw" ? "2,4" : "none";
                var isFocused = focusedPort && (
                  (conn.from.device === focusedPort.devId && conn.from.port === focusedPort.portId) ||
                  (conn.to.device === focusedPort.devId && conn.to.port === focusedPort.portId)
                );
                var isDimmed = focusedPort && !isFocused && !isSel && !isMSel;
                var baseW = conn.strokeW || globalCableW;
                var baseOp = conn.opacity !== undefined ? conn.opacity : globalCableOp;
                var isHov = hoveredConn === conn.id;
                var strokeColor = isMSel ? "#00CEC9" : isFocused ? "#fff" : isHov ? "#fff" : kc.line;
                var strokeW = isMSel ? Math.max(4, baseW) : isFocused ? Math.max(4, baseW) : isSel ? Math.max(3.5, baseW) : isHov ? Math.max(3, baseW) : baseW;
                var strokeOp = isDimmed ? 0.05 : (isMSel || isFocused || isSel || isHov ? 1 : baseOp);
                return (
                  <g key={conn.id}>
                    <path d={path} fill="none" stroke={strokeColor} strokeWidth={strokeW}
                      strokeDasharray={dashed} strokeOpacity={strokeOp}
                      filter={isMSel || isFocused || isSel || isHov ? "url(#glow-" + (conn.kind || "audio") + ")" : undefined}
                      style={{ cursor: "pointer", transition: "stroke-opacity 0.15s, stroke-width 0.15s" }}
                      onMouseEnter={function() { setHoveredConn(conn.id); }}
                      onMouseLeave={function() { setHoveredConn(null); }}
                      onClick={function(e) {
                        e.stopPropagation();
                        var cid = conn.id;
                        if (e.ctrlKey || e.metaKey) {
                          setMultiSelectConn(function(msc) {
                            if (msc.indexOf(cid) >= 0) return msc.filter(function(id) { return id !== cid; });
                            return msc.concat([cid]);
                          });
                          setSelectedConn(null);
                        } else {
                          setSelectedConn(cid);
                          setMultiSelectConn([]);
                        }
                      }}
                    />
                    <path d={path} fill="none" stroke="transparent" strokeWidth={18}
                      style={{ cursor: "pointer" }}
                      onMouseEnter={function() { setHoveredConn(conn.id); }}
                      onMouseLeave={function() { setHoveredConn(null); }}
                      onClick={function(e) {
                        e.stopPropagation();
                        var cid = conn.id;
                        if (e.ctrlKey || e.metaKey) {
                          setMultiSelectConn(function(msc) {
                            if (msc.indexOf(cid) >= 0) return msc.filter(function(id) { return id !== cid; });
                            return msc.concat([cid]);
                          });
                          setSelectedConn(null);
                        } else {
                          setSelectedConn(cid);
                          setMultiSelectConn([]);
                        }
                      }}
                    />
                    {conn.label ? (
                      <g transform={"translate(" + midX + "," + midY + ")"}>
                        <rect x={-conn.label.length * 3.5 - 6} y={-9} width={conn.label.length * 7 + 12} height={18} rx={3}
                          fill="rgba(0,0,0,0.8)" stroke={kc.line} strokeWidth={0.5} />
                        <text textAnchor="middle" dy={4} fill={kc.line} fontSize={10} fontFamily="inherit">{conn.label}</text>
                      </g>
                    ) : null}
                  </g>
                );
              })}

              {/* Connecting preview */}
              {connecting ? (
                <line
                  x1={getPortPos(connecting.devId, connecting.portId, devices).x}
                  y1={getPortPos(connecting.devId, connecting.portId, devices).y}
                  x2={mousePos.x} y2={mousePos.y}
                  stroke="rgba(255,255,255,0.4)" strokeWidth={2} strokeDasharray="6,4" />
              ) : null}

              {/* Sticky Notes */}
              {stickyNotes.map(function(note) {
                var isSel = selectedNote === note.id;
                var nw = note.w || 200;
                return (
                  <g key={note.id}
                    onPointerDown={function(e) {
                      e.stopPropagation();
                      var rect = svgRef.current.getBoundingClientRect();
                      var w = screenToWorld(e.clientX - rect.left, e.clientY - rect.top);
                      setDraggingNote2({ id: note.id, ox: w.x - note.x, oy: w.y - note.y });
                      setSelectedNote(note.id);
                      setSelected(null);
                    }}>
                    <rect x={note.x + 3} y={note.y + 3} width={nw} height={80} rx={4} fill="rgba(0,0,0,0.25)" />
                    <rect x={note.x} y={note.y} width={nw} height={80} rx={4}
                      fill={note.color + "22"} stroke={isSel ? note.color : note.color + "44"}
                      strokeWidth={isSel ? 2 : 1} />
                    <rect x={note.x} y={note.y} width={nw} height={22} rx={4} fill={note.color + "33"} />
                    <text x={note.x + 8} y={note.y + 15} fill={note.color} fontSize={10} fontWeight={700} fontFamily="inherit">Nota</text>
                    {isSel ? (
                      <g onClick={function(e) { e.stopPropagation(); deleteStickyNote(note.id); }} style={{ cursor: "pointer" }}>
                        <circle cx={note.x + nw - 12} cy={note.y + 12} r={8} fill="rgba(255,0,0,0.2)" stroke="rgba(255,80,80,0.5)" strokeWidth={1} />
                        <text x={note.x + nw - 12} y={note.y + 16} textAnchor="middle" fill="#ff5050" fontSize={11}>x</text>
                      </g>
                    ) : null}
                    <foreignObject x={note.x + 6} y={note.y + 26} width={nw - 12} height={48}>
                      <div xmlns="http://www.w3.org/1999/xhtml"
                        contentEditable suppressContentEditableWarning
                        onBlur={function(e) {
                          var nid = note.id;
                          var txt = e.target.innerText;
                          setStickyNotes(function(ns) {
                            return ns.map(function(n) {
                              if (n.id !== nid) return n;
                              return { id: n.id, x: n.x, y: n.y, text: txt, color: n.color, w: n.w };
                            });
                          });
                        }}
                        onPointerDown={function(e) { e.stopPropagation(); }}
                        style={{ color: "rgba(255,255,255,0.7)", fontSize: 10, fontFamily: "inherit",
                          lineHeight: 1.4, outline: "none", width: "100%", height: "100%",
                          overflow: "hidden", cursor: "text", wordBreak: "break-word" }}>
                        {note.text}
                      </div>
                    </foreignObject>
                  </g>
                );
              })}

              {/* Device Nodes */}
              {devices.map(function(dev) {
                var h = nodeHeight(dev);
                var isSel = selected === dev.id;
                var isMSel = multiSelect.indexOf(dev.id) >= 0;
                var inPorts = dev.ports.filter(function(p) { return p.dir === "in" || p.dir === "both"; });
                var outPorts = dev.ports.filter(function(p) { return p.dir === "out" || p.dir === "both"; });
                return (
                  <g key={dev.id} onPointerDown={function(e) { startDrag(dev, e); }}>
                    <rect x={dev.x + 4} y={dev.y + 4} width={NODE_W} height={h} rx={8} fill="rgba(0,0,0,0.4)" />
                    <rect x={dev.x} y={dev.y} width={NODE_W} height={h} rx={8}
                      fill="rgba(18,18,28,0.95)"
                      stroke={isMSel ? "#00CEC9" : (isSel ? dev.color : "rgba(255,255,255,0.08)")}
                      strokeWidth={isMSel ? 2.5 : (isSel ? 2 : 1)} />
                    <rect x={dev.x} y={dev.y} width={NODE_W} height={HEADER_H} rx={8} fill={dev.color + "18"} />
                    <rect x={dev.x} y={dev.y + HEADER_H - 1} width={NODE_W} height={2} fill={dev.color + "33"} />
                    <text x={dev.x + 12} y={dev.y + 18} fill={dev.color} fontSize={16} fontFamily="inherit">
                      {TYPE_ICONS[dev.type] || "●"}
                    </text>
                    <text x={dev.x + 32} y={dev.y + 18} fill="#fff" fontSize={12} fontWeight={700} fontFamily="inherit">{dev.name}</text>
                    <text x={dev.x + 32} y={dev.y + 32} fill="rgba(255,255,255,0.3)" fontSize={9} fontFamily="inherit">{dev.type}</text>

                    {/* Note indicator */}
                    {dev.notes ? (
                      <g onClick={function(e) { e.stopPropagation(); setEditingDeviceNote(dev.id); }}>
                        <rect x={dev.x + 4} y={dev.y + h - 28} width={NODE_W - 8} height={22} rx={4}

                        <text x={dev.x + 12} y={dev.y + h - 14} fill="rgba(255,234,167,0.6)" fontSize={8} fontFamily="inherit">
                          {dev.notes.length > 32 ? dev.notes.substring(0, 32) + "..." : dev.notes}
                        </text>
                      </g>
                    ) : null}

                    {/* Action buttons when selected */}
                    {isSel ? (
                      <g>
                        <g onClick={function(e) { e.stopPropagation(); deleteDevice(dev.id); }} style={{ cursor: "pointer" }}>
                          <circle cx={dev.x + NODE_W - 14} cy={dev.y + 14} r={9} fill="rgba(255,0,0,0.2)" stroke="rgba(255,80,80,0.5)" strokeWidth={1} />

                        </g>
                        <g onClick={function(e) { e.stopPropagation(); setEditingDeviceNote(dev.id); }} style={{ cursor: "pointer" }}>
                          <circle cx={dev.x + NODE_W - 38} cy={dev.y + 14} r={9} fill="rgba(255,234,167,0.15)" stroke="rgba(255,234,167,0.4)" strokeWidth={1} />
                          <text x={dev.x + NODE_W - 38} y={dev.y + 18} textAnchor="middle" fill="#FFEAA7" fontSize={10}>✎</text>
                        </g>
                        <g onClick={function(e) { e.stopPropagation(); setEditingPorts(dev.id); }} style={{ cursor: "pointer" }}>
                          <circle cx={dev.x + NODE_W - 62} cy={dev.y + 14} r={9} fill="rgba(116,185,255,0.15)" stroke="rgba(116,185,255,0.4)" strokeWidth={1} />
                          <text x={dev.x + NODE_W - 62} y={dev.y + 18} textAnchor="middle" fill="#74B9FF" fontSize={10}>⚙</text>
                        </g>
                      </g>
                    ) : null}

                    {/* Input ports */}
                    {inPorts.map(function(port, i) {
                      var py = dev.y + HEADER_H + PORT_PAD + i * (PORT_H + PORT_PAD);
                      var kc = KIND_COLORS[port.kind] || KIND_COLORS.audio;
                      return (
                        <g key={port.id}
                          onClick={function(e) {
                            if (e.shiftKey) {
                              e.stopPropagation();
                              var fp = focusedPort && focusedPort.devId === dev.id && focusedPort.portId === port.id;
                              setFocusedPort(fp ? null : { devId: dev.id, portId: port.id });
                              return;
                            }
                            startConnect(dev.id, port.id, e);
                          }}
                          onMouseEnter={function(e) {
                            var rect = svgRef.current.getBoundingClientRect();
                            setHoveredPort({ devId: dev.id, portId: port.id,
                              sx: e.clientX - rect.left, sy: e.clientY - rect.top });
                          }}
                          onMouseLeave={function() { setHoveredPort(null); }}
                          style={{ cursor: "pointer" }}>
                          <circle cx={dev.x} cy={py + PORT_H / 2} r={5}
                            fill={focusedPort && focusedPort.devId === dev.id && focusedPort.portId === port.id ? "#fff" : kc.line}
                            stroke="rgba(0,0,0,0.5)" strokeWidth={1.5} />
                          <text x={dev.x + 12} y={py + PORT_H / 2 + 3.5} fill="rgba(255,255,255,0.6)" fontSize={9} fontFamily="inherit">{port.name}</text>
                        </g>
                      );
                    })}
                    {/* Output ports */}
                    {outPorts.map(function(port, i) {
                      var py = dev.y + HEADER_H + PORT_PAD + i * (PORT_H + PORT_PAD);
                      var kc = KIND_COLORS[port.kind] || KIND_COLORS.audio;
                      return (
                        <g key={port.id}
                          onClick={function(e) {
                            if (e.shiftKey) {
                              e.stopPropagation();
                              var fp = focusedPort && focusedPort.devId === dev.id && focusedPort.portId === port.id;
                              setFocusedPort(fp ? null : { devId: dev.id, portId: port.id });
                              return;
                            }
                            startConnect(dev.id, port.id, e);
                          }}
                          onMouseEnter={function(e) {
                            var rect = svgRef.current.getBoundingClientRect();
                            setHoveredPort({ devId: dev.id, portId: port.id,
                              sx: e.clientX - rect.left, sy: e.clientY - rect.top });
                          }}
