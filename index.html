  ]},
  { id: "fcone", name: "DoreMidi FC", type: "controller", color: "#FDCB6E", x: 60, y: 1100, ports: [
    { id: "fc-usb", name: "USB", dir: "both", kind: "midi" },
  ]},
  { id: "metamod", name: "MetaModule", type: "converter", color: "#55EFC4", x: 60, y: 1240, ports: [
    { id: "mm-usb", name: "USB-C", dir: "in", kind: "midi" },
    { id: "mm-cv1", name: "CV Out 1", dir: "out", kind: "cv" },

const KIND_COLORS = {
  audio: { line: "#00CEC9", glow: "rgba(0,206,201,0.4)", label: "Audio" },
  midi: { line: "#E8B931", glow: "rgba(232,185,49,0.4)", label: "MIDI" },
  cv: { line: "#E84393", glow: "rgba(232,67,147,0.4)", label: "CV" },
  digital: { line: "#74B9FF", glow: "rgba(116,185,255,0.4)", label: "Digital" },
};

const TYPE_ICONS = {
  sequencer: "\u2399", synth: "\u223F", sampler: "\u25A6", "drum-machine": "\u25C9",
  controller: "\u2B1A", mixer: "\u2261", interface: "\u25C8", preamp: "\u25B3",
  converter: "\u21C4", effect: "\u2606", "midi-router": "\u2194", "midi-hub": "\u2B82",
  modular: "\u25A4", clock: "\u23F1", tablet: "\u25FB", patchbay: "\u2503",
  monitor: "\u25E8", mic: "\u2388",
};

const NODE_W = 260;
const PORT_H = 22;
const PORT_PAD = 6;
const HEADER_H = 42;

function getPortPos(device, port, devices) {
  const d = devices.find(dd => dd.id === device);
  if (!d) return { x: 0, y: 0 };
  const pIdx = d.ports.findIndex(p => p.id === port);
  const inPorts = d.ports.filter(p => p.dir === "in" || p.dir === "both");
  const outPorts = d.ports.filter(p => p.dir === "out" || p.dir === "both");
  const p = d.ports[pIdx];
  if (!p) return { x: d.x, y: d.y };
  const isOut = p.dir === "out";
  const isBoth = p.dir === "both";
  let list, side;
  if (isOut) { list = outPorts; side = "right"; }
  else if (isBoth) {
    const inIdx = inPorts.indexOf(p);
    const outIdx = outPorts.indexOf(p);
    list = outPorts; side = "right";
  }
  else { list = inPorts; side = "left"; }
  const idx = list.indexOf(p);
  const x = side === "right" ? d.x + NODE_W : d.x;
  const y = d.y + HEADER_H + PORT_PAD + idx * (PORT_H + PORT_PAD) + PORT_H / 2;
  return { x, y };
}

function StudioRouter() {
  const [devices, setDevices] = useState([]);
  const [connections, setConnections] = useState([]);
  const [dragging, setDragging] = useState(null);
  const [connecting, setConnecting] = useState(null);
  const [mousePos, setMousePos] = useState({ x: 0, y: 0 });
  const [selected, setSelected] = useState(null);
  const [selectedConn, setSelectedConn] = useState(null);
  const [pan, setPan] = useState({ x: 0, y: 0 });
  const [zoom, setZoom] = useState(0.65);
  const [isPanning, setIsPanning] = useState(false);
  const [panStart, setPanStart] = useState(null);
  const [showAdd, setShowAdd] = useState(false);
  const [newDevice, setNewDevice] = useState({ name: "", type: "synth", color: "#00B894" });
  const [newPorts, setNewPorts] = useState([]);
  const [connLabel, setConnLabel] = useState("");
  const [editingConn, setEditingConn] = useState(null);
  const [filter, setFilter] = useState("all");
  const [mode, setMode] = useState("all");
  const [stickyNotes, setStickyNotes] = useState([]);
  const [selectedNote, setSelectedNote] = useState(null);
  const [draggingNote, setDraggingNote] = useState(null);
  const [editingDeviceNote, setEditingDeviceNote] = useState(null);
  const [editingPorts, setEditingPorts] = useState(null);
  const svgRef = useRef(null);
  const loaded = useRef(false);

  useEffect(() => {
    if (loaded.current) return;
    loaded.current = true;
    (async () => {
      try {
        const r = { value: localStorage.getItem("studio-router-data") };
        if (r && r.value) {
          const d = JSON.parse(r.value);
          setDevices(d.devices || DEFAULT_DEVICES);
          setConnections(d.connections || []);
          setStickyNotes(d.stickyNotes || []);
          if (d.pan) setPan(d.pan);
          if (d.zoom) setZoom(d.zoom);
          return;
        }
      } catch(e) {}
      setDevices(DEFAULT_DEVICES);
    })();
  }, []);

  const save = useCallback((devs, conns, p, z, notes) => {
    try {
      localStorage.setItem("studio-router-data", JSON.stringify({
        devices: devs, connections: conns, stickyNotes: notes, pan: p, zoom: z
      }));
    } catch(e) {}
  }, []);

  useEffect(() => {
    if (loaded.current && devices.length > 0) save(devices, connections, pan, zoom, stickyNotes);
  }, [devices, connections, pan, zoom, stickyNotes, save]);

  const screenToWorld = (sx, sy) => ({
    x: (sx - pan.x) / zoom,
    y: (sy - pan.y) / zoom,
  });

  const handleWheel = (e) => {
    e.preventDefault();
    const delta = e.deltaY > 0 ? 0.92 : 1.08;
    const nz = Math.max(0.15, Math.min(2.5, zoom * delta));
    const rect = svgRef.current.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    setPan(p => ({
      x: mx - (mx - p.x) * (nz / zoom),
      y: my - (my - p.y) * (nz / zoom),
    }));
    setZoom(nz);
  };

  const handlePointerDown = (e) => {
    if (e.target === svgRef.current || e.target.classList.contains("bg-grid")) {
      if (connecting) {
        setConnecting(null);
        return;
      }
      setIsPanning(true);
      setPanStart({ x: e.clientX - pan.x, y: e.clientY - pan.y });
      setSelected(null);
      setSelectedConn(null);
      setEditingConn(null);
    }
  };

  const handlePointerMove = (e) => {
    const rect = svgRef.current.getBoundingClientRect();
    const sx = e.clientX - rect.left;
    const sy = e.clientY - rect.top;
    setMousePos(screenToWorld(sx, sy));

    if (isPanning && panStart) {
      setPan({ x: e.clientX - panStart.x, y: e.clientY - panStart.y });
      return;
    }
    if (draggingNote) {
      const w = screenToWorld(sx, sy);
      setStickyNotes(ns => ns.map(n =>
        n.id === draggingNote.id ? { ...n, x: w.x - draggingNote.ox, y: w.y - draggingNote.oy } : n
      ));
      return;
    }
    if (dragging) {
      const w = screenToWorld(sx, sy);
      setDevices(ds => ds.map(d =>
        d.id === dragging.id ? { ...d, x: w.x - dragging.ox, y: w.y - dragging.oy } : d
      ));
    }
  };

  const handlePointerUp = () => {
    setDragging(null);
    setDraggingNote(null);
    setIsPanning(false);
    setPanStart(null);
  };

  const startDrag = (dev, e) => {
    e.stopPropagation();
    const rect = svgRef.current.getBoundingClientRect();
    const w = screenToWorld(e.clientX - rect.left, e.clientY - rect.top);
    setDragging({ id: dev.id, ox: w.x - dev.x, oy: w.y - dev.y });
    setSelected(dev.id);
    setSelectedConn(null);
    setEditingConn(null);
  };

  const startConnect = (devId, portId, e) => {
    e.stopPropagation();
    if (connecting) {
      if (connecting.devId !== devId) {
        const srcPort = devices.find(d => d.id === connecting.devId)?.ports.find(p => p.id === connecting.portId);
        const tgtPort = devices.find(d => d.id === devId)?.ports.find(p => p.id === portId);
        if (srcPort && tgtPort) {
          const newConn = {
            id: `c-${Date.now()}`,
            from: { device: connecting.devId, port: connecting.portId },
            to: { device: devId, port: portId },
            kind: srcPort.kind,
            label: "",
            mode: "all",
          };
          setConnections(cs => [...cs, newConn]);
        }
      }
      setConnecting(null);
    } else {
      setConnecting({ devId, portId });
    }
  };

  const deleteDevice = (id) => {
    setDevices(ds => ds.filter(d => d.id !== id));
    setConnections(cs => cs.filter(c => c.from.device !== id && c.to.device !== id));
    setSelected(null);
  };

  const deleteConnection = (id) => {
    setConnections(cs => cs.filter(c => c.id !== id));
    setSelectedConn(null);
  };

  const addDevice = () => {
    if (!newDevice.name.trim()) return;
    const id = `dev-${Date.now()}`;
    const center = screenToWorld(400, 300);
    setDevices(ds => [...ds, {
      id, name: newDevice.name.trim(), type: newDevice.type,
      color: newDevice.color, x: center.x, y: center.y,
      ports: newPorts.map((p, i) => ({ ...p, id: `${id}-p${i}` })),
    }]);
    setNewDevice({ name: "", type: "synth", color: "#00B894" });
    setNewPorts([]);
    setShowAdd(false);
  };

  const addPort = () => {
    setNewPorts(ps => [...ps, { name: `Port ${ps.length + 1}`, dir: "out", kind: "audio" }]);
  };

  const filteredConns = connections.filter(c => {
    if (filter !== "all" && c.kind !== filter) return false;
    if (mode !== "all" && c.mode !== "all" && c.mode !== mode) return false;
    return true;
  });

  const nodeHeight = (dev) => {
    const inP = dev.ports.filter(p => p.dir === "in" || p.dir === "both").length;
    const outP = dev.ports.filter(p => p.dir === "out" || p.dir === "both").length;
    const base = HEADER_H + Math.max(inP, outP) * (PORT_H + PORT_PAD) + PORT_PAD * 2;
    return dev.notes ? base + 28 : base;
  };

  const resetView = () => {
    setPan({ x: 60, y: 60 });
    setZoom(0.55);
  };

  const [toastMsg, setToastMsg] = useState("");
  const showToast = (msg) => { setToastMsg(msg); setTimeout(() => setToastMsg(""), 3000); };

  const [showExportModal, setShowExportModal] = useState(false);
  const [exportData, setExportData] = useState("");
  const [savedSnapshots, setSavedSnapshots] = useState([]);
  const [showSnapshots, setShowSnapshots] = useState(false);

  useEffect(() => {
    (async () => {
      try {
        const r = { value: localStorage.getItem("studio-router-snapshots") };
        if (r && r.value) setSavedSnapshots(JSON.parse(r.value));
      } catch(e) {}
    })();
  }, []);

  const saveSnapshot = (name) => {
    const timestamp = new Date().toISOString().slice(0, 19).replace("T", " ");
    const snap = { id: "snap-" + Date.now(), name: name || timestamp, date: timestamp, data: { version: 2, devices, connections, stickyNotes } };
    const updated = [...savedSnapshots, snap];
    setSavedSnapshots(updated);
    try { localStorage.setItem("studio-router-snapshots", JSON.stringify(updated)); } catch(e) {}
    showToast("Snapshot guardado: " + snap.name);
  };

  const loadSnapshot = (snap) => {
    setDevices(snap.data.devices || []);
    setConnections(snap.data.connections || []);
    setStickyNotes(snap.data.stickyNotes || []);
    setPan({ x: 60, y: 60 });
    setZoom(0.45);
    setShowSnapshots(false);
    showToast("Cargado: " + snap.name);
  };

  const deleteSnapshot = (id) => {
    const updated = savedSnapshots.filter(s => s.id !== id);
    setSavedSnapshots(updated);
    try { localStorage.setItem("studio-router-snapshots", JSON.stringify(updated)); } catch(e) {}
  };

  const exportJSON = () => {
    if (!devices || devices.length === 0) { showToast("No hay dispositivos para exportar"); return; }
    const data = JSON.stringify({ version: 2, exportDate: new Date().toISOString(), devices, connections, stickyNotes }, null, 2);
    setExportData(data);
    setShowExportModal(true);
  };

  const copyToClipboard = async () => {
    try { await navigator.clipboard.writeText(exportData); showToast("JSON copiado al portapapeles"); }
    catch(e) { showToast("No se pudo copiar - selecciona el texto manualmente"); }
  };

  const fileInputRef = useRef(null);

  const [showImportModal, setShowImportModal] = useState(false);
  const [importText, setImportText] = useState("");

  const importFromText = () => {
    try {
      const d = JSON.parse(importText);
      if (d.devices && Array.isArray(d.devices) && d.devices.length > 0) {
        setDevices(d.devices);
        setConnections(d.connections || []);
        setStickyNotes(d.stickyNotes || []);
        setPan({ x: 60, y: 60 });
        setZoom(0.45);
        setShowImportModal(false);
        setImportText("");
        showToast("Importado: " + d.devices.length + " dispositivos, " + (d.connections?.length || 0) + " conexiones");
      } else {
        showToast("El JSON no contiene dispositivos validos");
      }
    } catch(err) {
      showToast("Error: JSON invalido - verifica que copiaste todo el texto");
    }
  };

  const importJSON = (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    if (!file.name.endsWith(".json")) {
      showToast("Solo archivos .json");
      e.target.value = "";
      return;
    }
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const d = JSON.parse(ev.target.result);
        if (d.devices && Array.isArray(d.devices) && d.devices.length > 0) {
          setDevices(d.devices);
          setConnections(d.connections || []);
          setStickyNotes(d.stickyNotes || []);
          setPan({ x: 60, y: 60 });
          setZoom(0.45);
          showToast("Importado: " + d.devices.length + " dispositivos, " + (d.connections?.length || 0) + " conexiones");
        } else {
          showToast("El archivo no contiene dispositivos validos");
        }
      } catch(err) {
        showToast("Error: JSON invalido");
      }
    };
    reader.readAsText(file);
    e.target.value = "";
  };

  const resetToDefaults = () => {
    setDevices(DEFAULT_DEVICES);
    setConnections([]);
    setPan({ x: 60, y: 60 });
    setZoom(0.45);
    setStickyNotes([]);
    try { localStorage.removeItem("studio-router-data"); } catch(e) {}
    showToast("Reset completo - " + DEFAULT_DEVICES.length + " dispositivos cargados");
  };

  const addStickyNote = () => {
    const center = screenToWorld(400, 300);
    const note = { id: "note-" + Date.now(), x: center.x, y: center.y, text: "Nueva nota...", color: "#FFEAA7", w: 200 };
    setStickyNotes(ns => [...ns, note]);
    setSelectedNote(note.id);
  };

  const deleteStickyNote = (id) => {
    setStickyNotes(ns => ns.filter(n => n.id !== id));
    setSelectedNote(null);
  };

  return (
    <div style={{ width: "100%", height: "100vh", background: "#0a0a0f", overflow: "hidden", fontFamily: "'JetBrains Mono', 'SF Mono', 'Fira Code', monospace", position: "relative" }}>

      {/* Toolbar */}
      <div style={{ position: "absolute", top: 0, left: 0, right: 0, zIndex: 20, background: "linear-gradient(180deg, rgba(15,15,25,0.97) 0%, rgba(15,15,25,0.85) 100%)", backdropFilter: "blur(12px)", borderBottom: "1px solid rgba(255,255,255,0.06)", padding: "8px 16px", display: "flex", alignItems: "center", gap: 10, flexWrap: "wrap" }}>
        <div style={{ fontSize: 16, fontWeight: 700, color: "#fff", letterSpacing: 2, marginRight: 8 }}>
          <span style={{ color: "#00CEC9" }}>\u25C8</span> STUDIO ROUTER
        </div>
        <div style={{ height: 20, width: 1, background: "rgba(255,255,255,0.1)" }} />
        {/* Filter buttons */}
        {["all", "audio", "midi", "cv", "digital"].map(f => (
          <button key={f} onClick={() => setFilter(f)}
            style={{ padding: "4px 12px", fontSize: 11, border: "1px solid", borderRadius: 4, cursor: "pointer", textTransform: "uppercase", letterSpacing: 1, fontFamily: "inherit", transition: "all 0.2s",
              background: filter === f ? (f === "all" ? "rgba(255,255,255,0.12)" : KIND_COLORS[f]?.line + "22") : "transparent",
              borderColor: filter === f ? (f === "all" ? "rgba(255,255,255,0.3)" : KIND_COLORS[f]?.line) : "rgba(255,255,255,0.08)",
              color: filter === f ? (f === "all" ? "#fff" : KIND_COLORS[f]?.line) : "rgba(255,255,255,0.4)",
            }}>
            {f === "all" ? "Todos" : KIND_COLORS[f]?.label || f}
          </button>
        ))}
        <div style={{ height: 20, width: 1, background: "rgba(255,255,255,0.1)" }} />
        {/* Mode filter */}
        {["all", "daw", "jam"].map(m => (
          <button key={m} onClick={() => setMode(m)}
            style={{ padding: "4px 12px", fontSize: 11, border: "1px solid", borderRadius: 4, cursor: "pointer", textTransform: "uppercase", letterSpacing: 1, fontFamily: "inherit", transition: "all 0.2s",
              background: mode === m ? "rgba(232,185,49,0.15)" : "transparent",
              borderColor: mode === m ? "#E8B931" : "rgba(255,255,255,0.08)",
              color: mode === m ? "#E8B931" : "rgba(255,255,255,0.4)",
            }}>
            {m === "all" ? "Ambos" : m === "daw" ? "DAW" : "Jam"}
          </button>
        ))}
        <div style={{ flex: 1 }} />
        <button onClick={() => setShowAdd(true)} style={{ padding: "5px 14px", fontSize: 11, background: "rgba(0,206,201,0.15)", border: "1px solid #00CEC9", borderRadius: 4, color: "#00CEC9", cursor: "pointer", fontFamily: "inherit", letterSpacing: 1 }}>
          + DISPOSITIVO
        </button>
        <button onClick={addStickyNote} style={{ padding: "5px 14px", fontSize: 11, background: "rgba(255,234,167,0.12)", border: "1px solid rgba(255,234,167,0.4)", borderRadius: 4, color: "#FFEAA7", cursor: "pointer", fontFamily: "inherit", letterSpacing: 1 }}>
          + NOTA
        </button>
        <button onClick={resetView} style={{ padding: "5px 14px", fontSize: 11, background: "rgba(255,255,255,0.06)", border: "1px solid rgba(255,255,255,0.1)", borderRadius: 4, color: "rgba(255,255,255,0.5)", cursor: "pointer", fontFamily: "inherit" }}>
          \u21BA Vista
        </button>
        <button onClick={() => saveSnapshot()} style={{ padding: "5px 14px", fontSize: 11, background: "rgba(0,206,201,0.08)", border: "1px solid rgba(0,206,201,0.3)", borderRadius: 4, color: "rgba(0,206,201,0.7)", cursor: "pointer", fontFamily: "inherit" }}>
          Guardar
        </button>
        <button onClick={() => setShowSnapshots(true)} style={{ padding: "5px 14px", fontSize: 11, background: "rgba(116,185,255,0.08)", border: "1px solid rgba(116,185,255,0.3)", borderRadius: 4, color: "rgba(116,185,255,0.7)", cursor: "pointer", fontFamily: "inherit" }}>
          Versiones {savedSnapshots.length > 0 ? "(" + savedSnapshots.length + ")" : ""}
        </button>
        <div style={{ height: 20, width: 1, background: "rgba(255,255,255,0.06)" }} />
        <button onClick={exportJSON} style={{ padding: "5px 14px", fontSize: 11, background: "rgba(255,255,255,0.06)", border: "1px solid rgba(255,255,255,0.1)", borderRadius: 4, color: "rgba(255,255,255,0.4)", cursor: "pointer", fontFamily: "inherit" }}>
          Copiar JSON
        </button>
        <button onClick={() => setShowImportModal(true)} style={{ padding: "5px 14px", fontSize: 11, background: "rgba(255,255,255,0.06)", border: "1px solid rgba(255,255,255,0.1)", borderRadius: 4, color: "rgba(255,255,255,0.4)", cursor: "pointer", fontFamily: "inherit" }}>
          Pegar JSON
        </button>
        <button onClick={resetToDefaults} style={{ padding: "5px 14px", fontSize: 11, background: "rgba(255,80,80,0.08)", border: "1px solid rgba(255,80,80,0.2)", borderRadius: 4, color: "rgba(255,80,80,0.6)", cursor: "pointer", fontFamily: "inherit" }}>
          Reset
        </button>
        <span style={{ fontSize: 10, color: "rgba(255,255,255,0.25)" }}>{Math.round(zoom * 100)}%</span>
      </div>

      {/* SVG Canvas */}
      <svg ref={svgRef} style={{ width: "100%", height: "100%", cursor: isPanning ? "grabbing" : connecting ? "crosshair" : "default" }}
        onWheel={handleWheel} onPointerDown={handlePointerDown}
        onPointerMove={handlePointerMove} onPointerUp={handlePointerUp}
        onContextMenu={(e) => { e.preventDefault(); setConnecting(null); }}
        tabIndex={0}
        onKeyDown={(e) => { if (e.key === "Escape") { setConnecting(null); setSelectedConn(null); setSelected(null); } }}>
        <defs>
          <pattern id="grid" x="0" y="0" width={40 * zoom} height={40 * zoom} patternUnits="userSpaceOnUse">
            <circle cx={pan.x % (40 * zoom)} cy={pan.y % (40 * zoom)} r="0.8" fill="rgba(255,255,255,0.04)" />
          </pattern>
          {Object.entries(KIND_COLORS).map(([k, v]) => (
            <filter id={`glow-${k}`} key={k}>
              <feGaussianBlur stdDeviation="4" result="blur" />
              <feFlood floodColor={v.line} floodOpacity="0.6" />
              <feComposite in2="blur" operator="in" />
              <feMerge><feMergeNode /><feMergeNode in="SourceGraphic" /></feMerge>
            </filter>
          ))}
        </defs>
        <rect className="bg-grid" width="100%" height="100%" fill="url(#grid)" />

        <g transform={`translate(${pan.x},${pan.y}) scale(${zoom})`}>
          {/* Connections */}
          {filteredConns.map(conn => {
            const from = getPortPos(conn.from.device, conn.from.port, devices);
            const to = getPortPos(conn.to.device, conn.to.port, devices);
            const kc = KIND_COLORS[conn.kind] || KIND_COLORS.audio;
            const dx = Math.abs(to.x - from.x) * 0.5;
            const path = `M${from.x},${from.y} C${from.x + dx},${from.y} ${to.x - dx},${to.y} ${to.x},${to.y}`;
            const isSel = selectedConn === conn.id;
            const midX = (from.x + to.x) / 2;
            const midY = (from.y + to.y) / 2;
            const isDashed = conn.mode === "jam" ? "6,4" : conn.mode === "daw" ? "2,4" : "none";
            return (
              <g key={conn.id}>
                <path d={path} fill="none" stroke={kc.line} strokeWidth={isSel ? 3.5 : 2}
                  strokeDasharray={isDashed} strokeOpacity={isSel ? 1 : 0.65}
                  filter={isSel ? `url(#glow-${conn.kind})` : undefined}
                  style={{ cursor: "pointer", transition: "stroke-opacity 0.2s" }}
                  onClick={(e) => { e.stopPropagation(); setSelectedConn(conn.id); setSelected(null); }}
                />
                {conn.label && (
                  <g transform={`translate(${midX}, ${midY})`}>
                    <rect x={-conn.label.length * 3.5 - 6} y={-9} width={conn.label.length * 7 + 12} height={18} rx={3} fill="rgba(0,0,0,0.8)" stroke={kc.line} strokeWidth={0.5} />
                    <text textAnchor="middle" dy={4} fill={kc.line} fontSize={10} fontFamily="inherit">{conn.label}</text>
                  </g>
                )}
              </g>
            );
          })}

          {/* Connecting line preview */}
          {connecting && (
            <line x1={getPortPos(connecting.devId, connecting.portId, devices).x}
              y1={getPortPos(connecting.devId, connecting.portId, devices).y}
              x2={mousePos.x} y2={mousePos.y}
              stroke="rgba(255,255,255,0.4)" strokeWidth={2} strokeDasharray="6,4" />
          )}

          {/* Sticky Notes */}
          {stickyNotes.map(note => {
            const isSel = selectedNote === note.id;
            const nw = note.w || 200;
            return (
              <g key={note.id}
                onPointerDown={(e) => {
                  e.stopPropagation();
                  const rect = svgRef.current.getBoundingClientRect();
                  const w = screenToWorld(e.clientX - rect.left, e.clientY - rect.top);
                  setDraggingNote({ id: note.id, ox: w.x - note.x, oy: w.y - note.y });
                  setSelectedNote(note.id);
                  setSelected(null);
                  setSelectedConn(null);
                }}>
                <rect x={note.x + 3} y={note.y + 3} width={nw} height={80} rx={4} fill="rgba(0,0,0,0.25)" />
                <rect x={note.x} y={note.y} width={nw} height={80} rx={4}
                  fill={note.color + "22"} stroke={isSel ? note.color : note.color + "44"} strokeWidth={isSel ? 2 : 1} />
                <rect x={note.x} y={note.y} width={nw} height={22} rx={4} fill={note.color + "33"} />
                <text x={note.x + 8} y={note.y + 15} fill={note.color} fontSize={10} fontWeight={700} fontFamily="inherit">
                  Nota
                </text>
                {isSel && (
                  <g onClick={(e) => { e.stopPropagation(); deleteStickyNote(note.id); }} style={{ cursor: "pointer" }}>
                    <circle cx={note.x + nw - 12} cy={note.y + 12} r={8} fill="rgba(255,0,0,0.2)" stroke="rgba(255,80,80,0.5)" strokeWidth={1} />
                    <text x={note.x + nw - 12} y={note.y + 16} textAnchor="middle" fill="#ff5050" fontSize={11}>x</text>
                  </g>
                )}
                <foreignObject x={note.x + 6} y={note.y + 26} width={nw - 12} height={48}>
                  <div xmlns="http://www.w3.org/1999/xhtml"
                    contentEditable suppressContentEditableWarning
                    onBlur={(e) => {
                      setStickyNotes(ns => ns.map(n => n.id === note.id ? { ...n, text: e.target.innerText } : n));
                    }}
                    onPointerDown={(e) => e.stopPropagation()}
                    style={{ color: "rgba(255,255,255,0.7)", fontSize: 10, fontFamily: "inherit", lineHeight: 1.4, outline: "none", width: "100%", height: "100%", overflow: "hidden", cursor: "text", wordBreak: "break-word" }}>
                    {note.text}
                  </div>
                </foreignObject>
              </g>
            );
          })}

          {/* Device Nodes */}
          {devices.map(dev => {
            const h = nodeHeight(dev);
            const isSel = selected === dev.id;
            const inPorts = dev.ports.filter(p => p.dir === "in" || p.dir === "both");
            const outPorts = dev.ports.filter(p => p.dir === "out" || p.dir === "both");
            return (
              <g key={dev.id} onPointerDown={(e) => startDrag(dev, e)}>
                {/* Shadow */}
                <rect x={dev.x + 4} y={dev.y + 4} width={NODE_W} height={h} rx={8} fill="rgba(0,0,0,0.4)" />
                {/* Body */}
                <rect x={dev.x} y={dev.y} width={NODE_W} height={h} rx={8}
                  fill="rgba(18,18,28,0.95)" stroke={isSel ? dev.color : "rgba(255,255,255,0.08)"}
                  strokeWidth={isSel ? 2 : 1} />
                {/* Header */}
                <rect x={dev.x} y={dev.y} width={NODE_W} height={HEADER_H} rx={8}
                  fill={dev.color + "18"} />
                <rect x={dev.x} y={dev.y + HEADER_H - 1} width={NODE_W} height={2}
                  fill={dev.color + "33"} />
                {/* Icon + Name */}
                <text x={dev.x + 12} y={dev.y + 18} fill={dev.color} fontSize={16} fontFamily="inherit">
                  {TYPE_ICONS[dev.type] || "\u25CF"}
                </text>
                <text x={dev.x + 32} y={dev.y + 18} fill="#fff" fontSize={12} fontWeight={700} fontFamily="inherit">
                  {dev.name}
                </text>
                <text x={dev.x + 32} y={dev.y + 32} fill="rgba(255,255,255,0.3)" fontSize={9} fontFamily="inherit">
                  {dev.type}
                </text>
                {/* Delete button */}
                {isSel && (
                  <g onClick={(e) => { e.stopPropagation(); deleteDevice(dev.id); }} style={{ cursor: "pointer" }}>
                    <circle cx={dev.x + NODE_W - 14} cy={dev.y + 14} r={9} fill="rgba(255,0,0,0.2)" stroke="rgba(255,80,80,0.5)" strokeWidth={1} />
                    <text x={dev.x + NODE_W - 14} y={dev.y + 18} textAnchor="middle" fill="#ff5050" fontSize={12}>\u00D7</text>
                  </g>
                )}
                {/* Note indicator */}
                {dev.notes && (
                  <g onClick={(e) => { e.stopPropagation(); setEditingDeviceNote(dev.id); setSelected(dev.id); }}>
                    <rect x={dev.x + 4} y={dev.y + h - 28} width={NODE_W - 8} height={22} rx={4}
                      fill="rgba(255,234,167,0.1)" stroke="rgba(255,234,167,0.2)" strokeWidth={0.5} />
                    <text x={dev.x + 12} y={dev.y + h - 14} fill="rgba(255,234,167,0.6)" fontSize={8} fontFamily="inherit">
                      {"\u270E"} {dev.notes.length > 30 ? dev.notes.substring(0, 30) + "..." : dev.notes}
                    </text>
                  </g>
                )}
                {isSel && (
                  <g onClick={(e) => { e.stopPropagation(); setEditingDeviceNote(dev.id); }} style={{ cursor: "pointer" }}>
                    <circle cx={dev.x + NODE_W - 38} cy={dev.y + 14} r={9} fill="rgba(255,234,167,0.15)" stroke="rgba(255,234,167,0.4)" strokeWidth={1} />
                    <text x={dev.x + NODE_W - 38} y={dev.y + 18} textAnchor="middle" fill="#FFEAA7" fontSize={10}>{"\u270E"}</text>
                  </g>
                )}
                {isSel && (
                  <g onClick={(e) => { e.stopPropagation(); setEditingPorts(dev.id); }} style={{ cursor: "pointer" }}>
                    <circle cx={dev.x + NODE_W - 62} cy={dev.y + 14} r={9} fill="rgba(116,185,255,0.15)" stroke="rgba(116,185,255,0.4)" strokeWidth={1} />
                    <text x={dev.x + NODE_W - 62} y={dev.y + 18} textAnchor="middle" fill="#74B9FF" fontSize={10}>{"\u2699"}</text>
                  </g>
                )}
                {/* Input ports (left side) */}
                {inPorts.map((port, i) => {
                  const py = dev.y + HEADER_H + PORT_PAD + i * (PORT_H + PORT_PAD);
                  const kc = KIND_COLORS[port.kind] || KIND_COLORS.audio;
                  return (
                    <g key={port.id} onClick={(e) => startConnect(dev.id, port.id, e)} style={{ cursor: "pointer" }}>
                      <circle cx={dev.x} cy={py + PORT_H / 2} r={5} fill={kc.line} stroke="rgba(0,0,0,0.5)" strokeWidth={1.5}
                        filter={connecting?.portId === port.id ? `url(#glow-${port.kind})` : undefined} />
                      <rect x={dev.x + 8} y={py} width={NODE_W / 2 - 12} height={PORT_H} rx={3}
                        fill="rgba(255,255,255,0.03)" />
                      <text x={dev.x + 14} y={py + PORT_H / 2 + 3.5} fill="rgba(255,255,255,0.6)" fontSize={9} fontFamily="inherit">
                        {port.name}
                      </text>
                    </g>
                  );
                })}
                {/* Output ports (right side) */}
                {outPorts.map((port, i) => {
                  const py = dev.y + HEADER_H + PORT_PAD + i * (PORT_H + PORT_PAD);
                  const kc = KIND_COLORS[port.kind] || KIND_COLORS.audio;
                  return (
                    <g key={port.id} onClick={(e) => startConnect(dev.id, port.id, e)} style={{ cursor: "pointer" }}>
                      <circle cx={dev.x + NODE_W} cy={py + PORT_H / 2} r={5} fill={kc.line} stroke="rgba(0,0,0,0.5)" strokeWidth={1.5}
                        filter={connecting?.portId === port.id ? `url(#glow-${port.kind})` : undefined} />
                      <rect x={dev.x + NODE_W / 2 + 4} y={py} width={NODE_W / 2 - 12} height={PORT_H} rx={3}
                        fill="rgba(255,255,255,0.03)" />
                      <text x={dev.x + NODE_W - 14} y={py + PORT_H / 2 + 3.5} fill="rgba(255,255,255,0.6)" fontSize={9} fontFamily="inherit" textAnchor="end">
                        {port.name}
                      </text>
                    </g>
                  );
                })}
              </g>
            );
          })}
        </g>
      </svg>

      {/* Connection Editor */}
      {selectedConn && (() => {
        const conn = connections.find(c => c.id === selectedConn);
        if (!conn) return null;
        const fromDev = devices.find(d => d.id === conn.from.device);
        const toDev = devices.find(d => d.id === conn.to.device);
        const fromPort = fromDev?.ports.find(p => p.id === conn.from.port);
        const toPort = toDev?.ports.find(p => p.id === conn.to.port);
        const kc = KIND_COLORS[conn.kind] || KIND_COLORS.audio;
        return (
          <div style={{ position: "absolute", bottom: 16, left: "50%", transform: "translateX(-50%)", background: "rgba(15,15,25,0.95)", border: `1px solid ${kc.line}40`, borderRadius: 8, padding: "12px 20px", display: "flex", alignItems: "center", gap: 12, backdropFilter: "blur(12px)", zIndex: 30 }}>
            <span style={{ color: kc.line, fontSize: 11, fontFamily: "inherit" }}>
              {fromDev?.name}:{fromPort?.name} \u2192 {toDev?.name}:{toPort?.name}
            </span>
            <input placeholder="Etiqueta..." value={conn.label || ""} onChange={e => {
              setConnections(cs => cs.map(c => c.id === selectedConn ? { ...c, label: e.target.value } : c));
            }} style={{ background: "rgba(255,255,255,0.06)", border: "1px solid rgba(255,255,255,0.1)", borderRadius: 4, padding: "3px 8px", color: "#fff", fontSize: 11, fontFamily: "inherit", width: 120 }} />
            <select value={conn.mode || "all"} onChange={e => {
              setConnections(cs => cs.map(c => c.id === selectedConn ? { ...c, mode: e.target.value } : c));
            }} style={{ background: "rgba(255,255,255,0.06)", border: "1px solid rgba(255,255,255,0.1)", borderRadius: 4, padding: "3px 8px", color: "#fff", fontSize: 11, fontFamily: "inherit" }}>
              <option value="all">Ambos</option>
              <option value="daw">Solo DAW</option>
              <option value="jam">Solo Jam</option>
            </select>
            <button onClick={() => deleteConnection(selectedConn)} style={{ background: "rgba(255,0,0,0.15)", border: "1px solid rgba(255,80,80,0.3)", borderRadius: 4, padding: "3px 10px", color: "#ff5050", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>
              Borrar
            </button>
          </div>
        );
      })()}

      {/* Device Note Editor */}
      {editingDeviceNote && (() => {
        const dev = devices.find(d => d.id === editingDeviceNote);
        if (!dev) return null;
        return (
          <div style={{ position: "absolute", bottom: 16, left: "50%", transform: "translateX(-50%)", background: "rgba(15,15,25,0.95)", border: "1px solid rgba(255,234,167,0.3)", borderRadius: 8, padding: "12px 20px", display: "flex", alignItems: "center", gap: 12, backdropFilter: "blur(12px)", zIndex: 30, maxWidth: 600 }}>
            <span style={{ color: dev.color, fontSize: 11, fontFamily: "inherit", whiteSpace: "nowrap" }}>
              {dev.name}
            </span>
            <input placeholder="Escribe una nota sobre este dispositivo..." value={dev.notes || ""} onChange={e => {
              setDevices(ds => ds.map(d => d.id === editingDeviceNote ? { ...d, notes: e.target.value } : d));
            }} style={{ background: "rgba(255,255,255,0.06)", border: "1px solid rgba(255,255,255,0.1)", borderRadius: 4, padding: "4px 10px", color: "#fff", fontSize: 11, fontFamily: "inherit", flex: 1, minWidth: 250 }} />
            <button onClick={() => setEditingDeviceNote(null)} style={{ background: "rgba(255,255,255,0.08)", border: "1px solid rgba(255,255,255,0.15)", borderRadius: 4, padding: "4px 12px", color: "rgba(255,255,255,0.5)", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>
              OK
            </button>
          </div>
        );
      })()}

      {/* Edit Ports Modal */}
      {editingPorts && (() => {
        const dev = devices.find(d => d.id === editingPorts);
        if (!dev) return null;
        const inputStyle = { background: "rgba(255,255,255,0.06)", border: "1px solid rgba(255,255,255,0.08)", borderRadius: 4, padding: "4px 8px", color: "#fff", fontSize: 11, fontFamily: "inherit" };
        const selectStyle = { ...inputStyle, padding: "4px" };
        return (
          <div style={{ position: "absolute", top: 0, left: 0, right: 0, bottom: 0, background: "rgba(0,0,0,0.7)", zIndex: 50, display: "flex", alignItems: "center", justifyContent: "center" }}
            onClick={() => setEditingPorts(null)}>
            <div onClick={e => e.stopPropagation()} style={{ background: "rgba(20,20,35,0.98)", border: "1px solid " + dev.color + "44", borderRadius: 12, padding: 24, width: 520, maxHeight: "85vh", overflow: "auto" }}>
              <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 16 }}>
                <div style={{ width: 12, height: 12, borderRadius: 3, background: dev.color }} />
                <h3 style={{ color: "#fff", margin: 0, fontSize: 15, fontFamily: "inherit", fontWeight: 600, flex: 1 }}>Editar Puertos: {dev.name}</h3>
                <span style={{ color: "rgba(255,255,255,0.3)", fontSize: 10, fontFamily: "inherit" }}>{dev.ports.length} puertos</span>
              </div>
              <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 12 }}>
                <span style={{ color: "rgba(255,255,255,0.4)", fontSize: 10, fontFamily: "inherit" }}>Nombre:</span>
                <input value={dev.name} onChange={e => {
                  setDevices(ds => ds.map(d => d.id === editingPorts ? { ...d, name: e.target.value } : d));
                }} style={{ ...inputStyle, flex: 1, fontSize: 13 }} />
                <select value={dev.type} onChange={e => {
                  setDevices(ds => ds.map(d => d.id === editingPorts ? { ...d, type: e.target.value } : d));
                }} style={selectStyle}>
                  {Object.keys(TYPE_ICONS).map(t => <option key={t} value={t}>{t}</option>)}
                </select>
                <input type="color" value={dev.color} onChange={e => {
                  setDevices(ds => ds.map(d => d.id === editingPorts ? { ...d, color: e.target.value } : d));
                }} style={{ width: 32, height: 28, border: "none", borderRadius: 4, cursor: "pointer", background: "transparent" }} />
              </div>
              <div style={{ borderTop: "1px solid rgba(255,255,255,0.06)", paddingTop: 12 }}>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 70px 70px 28px", gap: 6, marginBottom: 8 }}>
                  <span style={{ color: "rgba(255,255,255,0.4)", fontSize: 9, fontFamily: "inherit", textTransform: "uppercase", letterSpacing: 1 }}>Nombre</span>
                  <span style={{ color: "rgba(255,255,255,0.4)", fontSize: 9, fontFamily: "inherit", textTransform: "uppercase", letterSpacing: 1 }}>Dir</span>
                  <span style={{ color: "rgba(255,255,255,0.4)", fontSize: 9, fontFamily: "inherit", textTransform: "uppercase", letterSpacing: 1 }}>Tipo</span>
                  <span></span>
                </div>
                {dev.ports.map((port, i) => {
                  const hasConn = connections.some(c => c.from.port === port.id || c.to.port === port.id);
                  return (
                    <div key={port.id} style={{ display: "grid", gridTemplateColumns: "1fr 70px 70px 28px", gap: 6, marginBottom: 4, alignItems: "center" }}>
                      <input value={port.name} onChange={e => {
                        setDevices(ds => ds.map(d => {
                          if (d.id !== editingPorts) return d;
                          const np = [...d.ports]; np[i] = { ...np[i], name: e.target.value };
                          return { ...d, ports: np };
                        }));
                      }} style={{ ...inputStyle }} />
                      <select value={port.dir} onChange={e => {
                        setDevices(ds => ds.map(d => {
                          if (d.id !== editingPorts) return d;
                          const np = [...d.ports]; np[i] = { ...np[i], dir: e.target.value };
                          return { ...d, ports: np };
                        }));
                      }} style={selectStyle}>
                        <option value="in">In</option>
                        <option value="out">Out</option>
                        <option value="both">Both</option>
                      </select>
                      <select value={port.kind} onChange={e => {
                        setDevices(ds => ds.map(d => {
                          if (d.id !== editingPorts) return d;
                          const np = [...d.ports]; np[i] = { ...np[i], kind: e.target.value };
                          return { ...d, ports: np };
                        }));
                      }} style={selectStyle}>
                        <option value="audio">Audio</option>
                        <option value="midi">MIDI</option>
                        <option value="cv">CV</option>
                        <option value="digital">Digital</option>
                      </select>
                      <button onClick={() => {
                        if (hasConn) {
                          if (!confirm("Este puerto tiene conexiones. Se borraran. Continuar?")) return;
                          setConnections(cs => cs.filter(c => c.from.port !== port.id && c.to.port !== port.id));
                        }
                        setDevices(ds => ds.map(d => {
                          if (d.id !== editingPorts) return d;
                          return { ...d, ports: d.ports.filter((_, j) => j !== i) };
                        }));
                      }} title={hasConn ? "Tiene conexiones - se borraran" : "Borrar puerto"}
                        style={{ background: "none", border: "none", color: hasConn ? "#ff5050" : "rgba(255,255,255,0.3)", cursor: "pointer", fontSize: 14, padding: 0, fontFamily: "inherit" }}>
                        x
                      </button>
                    </div>
                  );
                })}
              </div>
              <button onClick={() => {
                setDevices(ds => ds.map(d => {
                  if (d.id !== editingPorts) return d;
                  const newId = d.id + "-p" + Date.now();
                  return { ...d, ports: [...d.ports, { id: newId, name: "Nuevo", dir: "out", kind: "audio" }] };
                }));
              }} style={{ width: "100%", padding: "6px", background: "rgba(255,255,255,0.04)", border: "1px dashed rgba(255,255,255,0.12)", borderRadius: 4, color: "rgba(255,255,255,0.4)", fontSize: 11, cursor: "pointer", fontFamily: "inherit", marginTop: 8, marginBottom: 16 }}>
                + Agregar Puerto
              </button>
              <button onClick={() => setEditingPorts(null)} style={{ width: "100%", padding: "8px", background: "rgba(116,185,255,0.15)", border: "1px solid rgba(116,185,255,0.3)", borderRadius: 6, color: "#74B9FF", fontSize: 12, cursor: "pointer", fontFamily: "inherit", fontWeight: 600 }}>
                Listo
              </button>
            </div>
          </div>
        );
      })()}

      {/* Add Device Modal */}
      {showAdd && (
        <div style={{ position: "absolute", top: 0, left: 0, right: 0, bottom: 0, background: "rgba(0,0,0,0.7)", zIndex: 40, display: "flex", alignItems: "center", justifyContent: "center" }}
          onClick={() => setShowAdd(false)}>
          <div onClick={e => e.stopPropagation()} style={{ background: "rgba(20,20,35,0.98)", border: "1px solid rgba(255,255,255,0.1)", borderRadius: 12, padding: 24, width: 380, maxHeight: "80vh", overflow: "auto" }}>
            <h3 style={{ color: "#fff", margin: "0 0 16px", fontSize: 15, fontFamily: "inherit", fontWeight: 600 }}>Nuevo Dispositivo</h3>
            <input placeholder="Nombre (ej: Moog Matriarch)" value={newDevice.name} onChange={e => setNewDevice(d => ({ ...d, name: e.target.value }))}
              style={{ width: "100%", boxSizing: "border-box", background: "rgba(255,255,255,0.06)", border: "1px solid rgba(255,255,255,0.12)", borderRadius: 6, padding: "8px 12px", color: "#fff", fontSize: 13, fontFamily: "inherit", marginBottom: 10 }} />
            <div style={{ display: "flex", gap: 8, marginBottom: 10 }}>
              <select value={newDevice.type} onChange={e => setNewDevice(d => ({ ...d, type: e.target.value }))}
                style={{ flex: 1, background: "rgba(255,255,255,0.06)", border: "1px solid rgba(255,255,255,0.12)", borderRadius: 6, padding: "8px", color: "#fff", fontSize: 12, fontFamily: "inherit" }}>
                {Object.keys(TYPE_ICONS).map(t => <option key={t} value={t}>{t}</option>)}
              </select>
              <input type="color" value={newDevice.color} onChange={e => setNewDevice(d => ({ ...d, color: e.target.value }))}
                style={{ width: 42, height: 36, border: "none", borderRadius: 6, cursor: "pointer", background: "transparent" }} />
            </div>

            <div style={{ color: "rgba(255,255,255,0.5)", fontSize: 11, marginBottom: 8, fontFamily: "inherit" }}>PUERTOS</div>
            {newPorts.map((p, i) => (
              <div key={i} style={{ display: "flex", gap: 6, marginBottom: 6, alignItems: "center" }}>
                <input value={p.name} onChange={e => {
                  const np = [...newPorts]; np[i] = { ...np[i], name: e.target.value }; setNewPorts(np);
                }} style={{ flex: 1, background: "rgba(255,255,255,0.06)", border: "1px solid rgba(255,255,255,0.08)", borderRadius: 4, padding: "4px 8px", color: "#fff", fontSize: 11, fontFamily: "inherit" }} />
                <select value={p.dir} onChange={e => {
                  const np = [...newPorts]; np[i] = { ...np[i], dir: e.target.value }; setNewPorts(np);
                }} style={{ background: "rgba(255,255,255,0.06)", border: "1px solid rgba(255,255,255,0.08)", borderRadius: 4, padding: "4px", color: "#fff", fontSize: 11, fontFamily: "inherit" }}>
                  <option value="in">In</option>
                  <option value="out">Out</option>
                  <option value="both">Both</option>
                </select>
                <select value={p.kind} onChange={e => {
                  const np = [...newPorts]; np[i] = { ...np[i], kind: e.target.value }; setNewPorts(np);
                }} style={{ background: "rgba(255,255,255,0.06)", border: "1px solid rgba(255,255,255,0.08)", borderRadius: 4, padding: "4px", color: "#fff", fontSize: 11, fontFamily: "inherit" }}>
                  <option value="audio">Audio</option>
                  <option value="midi">MIDI</option>
                  <option value="cv">CV</option>
                  <option value="digital">Digital</option>
                </select>
                <button onClick={() => setNewPorts(ps => ps.filter((_, j) => j !== i))} style={{ background: "none", border: "none", color: "#ff5050", cursor: "pointer", fontSize: 14, padding: "0 4px" }}>\u00D7</button>
              </div>
            ))}
            <button onClick={addPort} style={{ width: "100%", padding: "6px", background: "rgba(255,255,255,0.04)", border: "1px dashed rgba(255,255,255,0.12)", borderRadius: 4, color: "rgba(255,255,255,0.4)", fontSize: 11, cursor: "pointer", fontFamily: "inherit", marginBottom: 16 }}>
              + Agregar Puerto
            </button>
            <div style={{ display: "flex", gap: 8 }}>
              <button onClick={addDevice} style={{ flex: 1, padding: "8px", background: "rgba(0,206,201,0.2)", border: "1px solid #00CEC9", borderRadius: 6, color: "#00CEC9", fontSize: 12, cursor: "pointer", fontFamily: "inherit", fontWeight: 600 }}>
                Crear
              </button>
              <button onClick={() => setShowAdd(false)} style={{ padding: "8px 16px", background: "rgba(255,255,255,0.06)", border: "1px solid rgba(255,255,255,0.1)", borderRadius: 6, color: "rgba(255,255,255,0.5)", fontSize: 12, cursor: "pointer", fontFamily: "inherit" }}>
                Cancelar
              </button>
            </div>
          </div>
        </div>
      )}

      {/* Export Modal - Copy JSON */}
      {showExportModal && (
        <div style={{ position: "absolute", top: 0, left: 0, right: 0, bottom: 0, background: "rgba(0,0,0,0.7)", zIndex: 50, display: "flex", alignItems: "center", justifyContent: "center" }}
          onClick={() => setShowExportModal(false)}>
          <div onClick={e => e.stopPropagation()} style={{ background: "rgba(20,20,35,0.98)", border: "1px solid rgba(255,255,255,0.1)", borderRadius: 12, padding: 24, width: 500, maxHeight: "80vh", display: "flex", flexDirection: "column", gap: 12 }}>
            <h3 style={{ color: "#fff", margin: 0, fontSize: 14, fontFamily: "inherit" }}>Exportar Ruteo (JSON)</h3>
            <p style={{ color: "rgba(255,255,255,0.4)", margin: 0, fontSize: 11, fontFamily: "inherit" }}>Copia este texto y guardalo en un archivo .json, o usa el boton de copiar.</p>
            <textarea value={exportData} readOnly style={{ width: "100%", height: 250, boxSizing: "border-box", background: "rgba(0,0,0,0.4)", border: "1px solid rgba(255,255,255,0.1)", borderRadius: 6, padding: 10, color: "#00CEC9", fontSize: 10, fontFamily: "inherit", resize: "none" }}
              onClick={(e) => e.target.select()} />
            <div style={{ display: "flex", gap: 8 }}>
              <button onClick={copyToClipboard} style={{ flex: 1, padding: "8px", background: "rgba(0,206,201,0.2)", border: "1px solid #00CEC9", borderRadius: 6, color: "#00CEC9", fontSize: 12, cursor: "pointer", fontFamily: "inherit", fontWeight: 600 }}>
                Copiar al portapapeles
              </button>
              <button onClick={() => setShowExportModal(false)} style={{ padding: "8px 16px", background: "rgba(255,255,255,0.06)", border: "1px solid rgba(255,255,255,0.1)", borderRadius: 6, color: "rgba(255,255,255,0.5)", fontSize: 12, cursor: "pointer", fontFamily: "inherit" }}>
                Cerrar
              </button>
            </div>
          </div>
        </div>
      )}

      {/* Import Modal - Paste JSON */}
      {showImportModal && (
        <div style={{ position: "absolute", top: 0, left: 0, right: 0, bottom: 0, background: "rgba(0,0,0,0.7)", zIndex: 50, display: "flex", alignItems: "center", justifyContent: "center" }}
          onClick={() => setShowImportModal(false)}>
          <div onClick={e => e.stopPropagation()} style={{ background: "rgba(20,20,35,0.98)", border: "1px solid rgba(255,255,255,0.1)", borderRadius: 12, padding: 24, width: 500, maxHeight: "80vh", display: "flex", flexDirection: "column", gap: 12 }}>
            <h3 style={{ color: "#fff", margin: 0, fontSize: 14, fontFamily: "inherit" }}>Importar Ruteo (JSON)</h3>
            <p style={{ color: "rgba(255,255,255,0.4)", margin: 0, fontSize: 11, fontFamily: "inherit" }}>Pega aqui el JSON que exportaste anteriormente.</p>
            <textarea value={importText} onChange={e => setImportText(e.target.value)} placeholder='Pega tu JSON aqui...' style={{ width: "100%", height: 250, boxSizing: "border-box", background: "rgba(0,0,0,0.4)", border: "1px solid rgba(255,255,255,0.1)", borderRadius: 6, padding: 10, color: "#fff", fontSize: 10, fontFamily: "inherit", resize: "none" }} />
            <div style={{ display: "flex", gap: 8 }}>
              <button onClick={importFromText} style={{ flex: 1, padding: "8px", background: "rgba(116,185,255,0.2)", border: "1px solid #74B9FF", borderRadius: 6, color: "#74B9FF", fontSize: 12, cursor: "pointer", fontFamily: "inherit", fontWeight: 600 }}>
                Importar
              </button>
              <button onClick={() => { setShowImportModal(false); setImportText(""); }} style={{ padding: "8px 16px", background: "rgba(255,255,255,0.06)", border: "1px solid rgba(255,255,255,0.1)", borderRadius: 6, color: "rgba(255,255,255,0.5)", fontSize: 12, cursor: "pointer", fontFamily: "inherit" }}>
                Cancelar
              </button>
            </div>
          </div>
        </div>
      )}

      {/* Snapshots / Versions Modal */}
      {showSnapshots && (
        <div style={{ position: "absolute", top: 0, left: 0, right: 0, bottom: 0, background: "rgba(0,0,0,0.7)", zIndex: 50, display: "flex", alignItems: "center", justifyContent: "center" }}
          onClick={() => setShowSnapshots(false)}>
          <div onClick={e => e.stopPropagation()} style={{ background: "rgba(20,20,35,0.98)", border: "1px solid rgba(255,255,255,0.1)", borderRadius: 12, padding: 24, width: 450, maxHeight: "80vh", display: "flex", flexDirection: "column", gap: 12 }}>
            <h3 style={{ color: "#fff", margin: 0, fontSize: 14, fontFamily: "inherit" }}>Versiones Guardadas</h3>
            {savedSnapshots.length === 0 ? (
              <p style={{ color: "rgba(255,255,255,0.3)", fontSize: 12, fontFamily: "inherit", textAlign: "center", padding: 20 }}>No hay versiones guardadas. Usa el boton "Guardar" para crear una.</p>
            ) : (
              <div style={{ maxHeight: 400, overflow: "auto", display: "flex", flexDirection: "column", gap: 6 }}>
                {savedSnapshots.map(snap => (
                  <div key={snap.id} style={{ display: "flex", alignItems: "center", gap: 10, padding: "8px 12px", background: "rgba(255,255,255,0.03)", borderRadius: 6, border: "1px solid rgba(255,255,255,0.06)" }}>
                    <div style={{ flex: 1 }}>
                      <div style={{ color: "#fff", fontSize: 12, fontFamily: "inherit" }}>{snap.name}</div>
                      <div style={{ color: "rgba(255,255,255,0.3)", fontSize: 9, fontFamily: "inherit" }}>{snap.date} | {snap.data.devices?.length || 0} dispositivos, {snap.data.connections?.length || 0} conexiones</div>
                    </div>
                    <button onClick={() => loadSnapshot(snap)} style={{ padding: "4px 10px", background: "rgba(0,206,201,0.15)", border: "1px solid rgba(0,206,201,0.3)", borderRadius: 4, color: "#00CEC9", fontSize: 10, cursor: "pointer", fontFamily: "inherit" }}>
                      Cargar
                    </button>
                    <button onClick={() => deleteSnapshot(snap.id)} style={{ padding: "4px 8px", background: "rgba(255,80,80,0.1)", border: "1px solid rgba(255,80,80,0.2)", borderRadius: 4, color: "#ff5050", fontSize: 10, cursor: "pointer", fontFamily: "inherit" }}>
                      x
                    </button>
                  </div>
                ))}
              </div>
            )}
            <button onClick={() => setShowSnapshots(false)} style={{ padding: "8px", background: "rgba(255,255,255,0.06)", border: "1px solid rgba(255,255,255,0.1)", borderRadius: 6, color: "rgba(255,255,255,0.5)", fontSize: 12, cursor: "pointer", fontFamily: "inherit" }}>
              Cerrar
            </button>
          </div>
        </div>
      )}

      {/* Toast notification */}
      {toastMsg && (
        <div style={{ position: "absolute", top: 56, left: "50%", transform: "translateX(-50%)", background: "rgba(15,15,25,0.95)", border: "1px solid rgba(0,206,201,0.4)", borderRadius: 8, padding: "8px 20px", zIndex: 50, backdropFilter: "blur(12px)", animation: "fadeIn 0.2s ease" }}>
          <span style={{ color: "#00CEC9", fontSize: 12, fontFamily: "inherit" }}>{toastMsg}</span>
        </div>
      )}

      {/* Help overlay */}
      <div style={{ position: "absolute", bottom: 16, right: 16, color: "rgba(255,255,255,0.2)", fontSize: 9, fontFamily: "inherit", textAlign: "right", lineHeight: 1.6, zIndex: 10 }}>
        Arrastra nodos • Click en puerto para conectar • Click derecho / Esc / click en fondo = cancelar cable • Scroll = zoom • Click+drag fondo = pan
      </div>
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<StudioRouter />);
  </script>
</body>
</html>
